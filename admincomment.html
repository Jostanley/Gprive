<!DOCTYPE html>
<html>
<head>
  <title>Admin - Comments</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold">Comments Management</h1>

  <input id="search" placeholder="Search comments..."
    class="border px-3 py-2 rounded w-64">
</div>

<!-- STATS -->
<div class="p-4 grid grid-cols-3 gap-4">
  <div class="bg-white p-4 rounded shadow">
    <p>Total Comments</p>
    <h2 id="total" class="text-2xl font-bold">0</h2>
  </div>
</div>

<!-- COMMENTS -->
<div id="comments" class="p-4 space-y-3"></div>

<script type="module">
import { supabase } from "./assets.js";

let allComments = [];

async function load() {
  const { data } = await supabase
    .from("comments")
    .select("*")
    .order("created_at", { ascending: false });

  allComments = data || [];

  document.getElementById("total").innerText = allComments.length;

  render(allComments);
}

function render(list) {
  document.getElementById("comments").innerHTML = list.map(c => `
    <div class="bg-white p-4 rounded-xl shadow flex justify-between items-start">

      <!-- LEFT -->
      <div>
        <p class="text-gray-800">${c.text}</p>

        <div class="text-xs text-gray-500 mt-1 flex gap-3">
          <span>👤 ${c.user_id}</span>
          <span>📅 ${new Date(c.created_at).toLocaleString()}</span>
        </div>
      </div>

      <!-- ACTION -->
      <button onclick="del('${c.id}')"
        class="bg-red-500 text-white px-3 py-1 rounded">
        Delete
      </button>

    </div>
  `).join("");
}

window.del = async (id) => {
  if (!confirm("Delete this comment?")) return;

  await supabase.from("comments").delete().eq("id", id);
  load();
};

document.getElementById("search").oninput = (e) => {
  const v = e.target.value.toLowerCase();

  render(allComments.filter(c =>
    (c.text || "").toLowerCase().includes(v) ||
    (c.user_id || "").toLowerCase().includes(v)
  ));
};

load();
</script>

</body>
</html>
