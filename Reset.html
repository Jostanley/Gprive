<div class="bg-white p-6 rounded-xl shadow w-80">
  <h2 class="text-xl font-bold mb-4 text-center">New Password</h2>

  <input id="new-password" type="password"
    placeholder="New password"
    class="w-full p-2 border mb-3 rounded">

  <button onclick="resetPassword()"
    class="w-full bg-blue-500 text-white p-2 rounded">
    Reset Password
  </button>

  <p id="msg" class="text-center mt-2"></p>
</div>

const supabasejs = window.supabaseClient;

async function resetPassword() {
  const password = document.getElementById("new-password").value;
  const msg = document.getElementById("msg");

  const { error } = await supabasejs.auth.updateUser({
    password: password
  });

  if (error) {
    msg.innerText = error.message;
    msg.style.color = "red";
    return;
  }

  msg.innerText = "Password updated successfully!";
  msg.style.color = "green";
}
</script>
