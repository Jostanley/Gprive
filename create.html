  <div class="max-w-md mx-auto bg-white p-4 rounded-xl shadow">

    <h1 class="text-xl font-bold mb-4">Create Post</h1>

    <!-- Title -->

    <!-- File input -->

      Add Photo / Video
      <input type="file" id="fileInput" accept="image/*,video/*" hidden />

      <img id="imagePreview" class="hidden w-full rounded-xl mb-2" />

      </button>

    </div>

    <!-- SINGLE BUTTON -->
    <button onclick="uploadAndPost()"
      class="w-full bg-green-600 text-white py-2 rounded-xl">
       Post
    </button>

  </div>

<script>

let selectedFile = null;

const fileInput = document.getElementById("fileInput");
const imagePreview = document.getElementById("imagePreview");
const videoPreview = document.getElementById("videoPreview");
const removeBtn = document.getElementById("removeBtn");

// FILE SELECT
fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // ✅ MIME TYPE CHECK
  const allowedTypes = [
    "image/jpeg",
    "image/png",
    "image/jpg",
    "image/webp",
    "video/mp4",
    "video/webm"
  ];

  if (!allowedTypes.includes(file.type)) {
    alert("Only images and videos are allowed!");
    fileInput.value = "";
    return;
  }

  selectedFile = file;
  const url = URL.createObjectURL(file);

  imagePreview.classList.add("hidden");
  videoPreview.classList.add("hidden");

  if (file.type.startsWith("image/")) {
    imagePreview.src = url;
    imagePreview.classList.remove("hidden");
  }

  if (file.type.startsWith("video/")) {
    videoPreview.src = url;
    videoPreview.classList.remove("hidden");
  }

  removeBtn.classList.remove("hidden");
});

// REMOVE FILE
removeBtn.onclick = () => {
  selectedFile = null;
  fileInput.value = "";

  imagePreview.src = "";
  videoPreview.src = "";

  imagePreview.classList.add("hidden");
  videoPreview.classList.add("hidden");
  removeBtn.classList.add("hidden");
};

// UPLOAD + POST
async function uploadAndPost() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();

  if (!title || !content) {
    alert("Title and content required");
    return;
  }

  try {
    const formData = new FormData();

    formData.append("title", title);
    formData.append("content", content);

    if (selectedFile) {
      formData.append("file", selectedFile);
    }

    const res = await fetch("http://localhost:5000/posts", {
      method: "POST",
      headers: {
    "Authorization": `Bearer ${token}`  
  },
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Failed to create post");
      return;
    }

    alert("Post created successfully!");

    // reset
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    removeBtn.onclick();

  } catch (err) {
    console.error(err);
    alert("Something went wrong");
  }
}
</script>
