<!DOCTYPE html>
<html>
<head>
  <title>Create Post</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="p-4 bg-gray-100">

<div class="max-w-md mx-auto bg-white p-4 rounded-xl shadow">

  <h1
    id="pageTitle"
    class="text-xl font-bold mb-4"
  >
    Create Post
  </h1>

  <!-- TITLE -->
  <input
    id="title"
    placeholder="Title"
    class="w-full p-2 border mb-2 rounded"
  />

  <!-- CONTENT -->
  <textarea
    id="content"
    placeholder="Content"
    class="w-full p-2 border mb-2 rounded"
  ></textarea>

  <!-- FILE -->
  <label class="block bg-black text-white py-2 rounded-xl cursor-pointer text-center mb-3">

    Add Photo / Video

    <input
      type="file"
      id="fileInput"
      accept="image/*,video/*"
      hidden
    />

  </label>

  <!-- PREVIEW -->
  <div class="relative">

    <img
      id="imagePreview"
      class="hidden w-full rounded-xl mb-2"
    />

    <video
      id="videoPreview"
      controls
      class="hidden w-full h-60 rounded-xl mb-2"
    ></video>

    <!-- REMOVE -->
    <button
      id="removeBtn"
      class="hidden absolute top-2 right-2 bg-red-500 text-white px-2 py-1 text-sm rounded"
    >
      Remove
    </button>

  </div>

  <!-- BUTTON -->
  <button
    id="submitBtn"
    onclick="uploadAndPost()"
    class="w-full bg-green-600 text-white py-2 rounded-xl"
  >
    Upload & Post
  </button>

</div>

<script>

// =====================
// SUPABASE
// =====================
const supabasejs =
  window.supabase.createClient(
    "https://edvwiqmydmxttviflouj.supabase.co",
    "YOUR_SUPABASE_ANON_KEY"
  );


// =====================
// API
// =====================
const API =
  "http://localhost:5000";


// =====================
// VARIABLES
// =====================
let selectedFile = null;

let currentUser = null;

let token = null;

let isUploading = false;

const editingPostId =
  localStorage.getItem(
    "editingPostId"
  );


// =====================
// ELEMENTS
// =====================
const fileInput =
  document.getElementById(
    "fileInput"
  );

const imagePreview =
  document.getElementById(
    "imagePreview"
  );

const videoPreview =
  document.getElementById(
    "videoPreview"
  );

const removeBtn =
  document.getElementById(
    "removeBtn"
  );


// =====================
// INIT USER
// =====================
async function initUser() {

  try {

    const {
      data,
      error
    } =
      await supabasejs
        .auth
        .getSession();

    if (
      error ||
      !data.session
    ) {

      alert(
        "Login required"
      );

      window.location.href =
        "Login.html";

      return;

    }

    currentUser =
      data.session.user;

    token =
      data.session.access_token;

    // edit mode
    if (editingPostId) {

      document
        .getElementById(
          "pageTitle"
        )
        .textContent =
          "Edit Post";

      document
        .getElementById(
          "submitBtn"
        )
        .textContent =
          "Update Post";

      loadPostForEditing();

    }

  } catch (err) {

    console.log(err);

    alert(
      "Failed to init"
    );

  }

}


// =====================
// LOAD POST FOR EDIT
// =====================
async function loadPostForEditing() {

  try {

    const res =
      await fetch(
        `${API}/posts`
      );

    const posts =
      await res.json();

    const post =
      posts.find(

        p =>
          p.id ==
          editingPostId

      );

    if (!post) {

      alert(
        "Post not found"
      );

      return;

    }

    document
      .getElementById(
        "title"
      )
      .value =
        post.title || "";

    document
      .getElementById(
        "content"
      )
      .value =
        post.content || "";

    // preview old media
    if (post.file) {

      if (

        post.file.includes(
          ".mp4"
        ) ||

        post.file.includes(
          ".webm"
        )

      ) {

        videoPreview.src =
          post.file;

        videoPreview
          .classList
          .remove(
            "hidden"
          );

      } else {

        imagePreview.src =
          post.file;

        imagePreview
          .classList
          .remove(
            "hidden"
          );

      }

      removeBtn
        .classList
        .remove(
          "hidden"
        );

    }

  } catch (err) {

    console.log(err);

    alert(
      "Failed to load post"
    );

  }

}


// =====================
// FILE SELECT
// =====================
fileInput.addEventListener(
  "change",

  (e) => {

    const file =
      e.target.files[0];

    if (!file)
      return;

    // MIME TYPES
    const allowedTypes = [

      "image/jpeg",
      "image/png",
      "image/jpg",
      "image/webp",

      "video/mp4",
      "video/webm"

    ];

    if (
      !allowedTypes.includes(
        file.type
      )
    ) {

      alert(
        "Only images and videos allowed"
      );

      fileInput.value = "";

      return;

    }

    selectedFile =
      file;

    const url =
      URL.createObjectURL(
        file
      );

    imagePreview
      .classList
      .add(
        "hidden"
      );

    videoPreview
      .classList
      .add(
        "hidden"
      );

    if (
      file.type.startsWith(
        "image/"
      )
    ) {

      imagePreview.src =
        url;

      imagePreview
        .classList
        .remove(
          "hidden"
        );

    }

    if (
      file.type.startsWith(
        "video/"
      )
    ) {

      videoPreview.src =
        url;

      videoPreview
        .classList
        .remove(
          "hidden"
        );

    }

    removeBtn
      .classList
      .remove(
        "hidden"
      );

  }

);


// =====================
// REMOVE FILE
// =====================
removeBtn.onclick =
  () => {

    selectedFile =
      null;

    fileInput.value =
      "";

    imagePreview.src =
      "";

    videoPreview.src =
      "";

    imagePreview
      .classList
      .add(
        "hidden"
      );

    videoPreview
      .classList
      .add(
        "hidden"
      );

    removeBtn
      .classList
      .add(
        "hidden"
      );

  };


// =====================
// CREATE / UPDATE POST
// =====================
async function uploadAndPost() {

  if (isUploading)
    return;

  isUploading = true;

  const title =
    document
      .getElementById(
        "title"
      )
      .value
      .trim();

  const content =
    document
      .getElementById(
        "content"
      )
      .value
      .trim();

  if (
    !title ||
    !content
  ) {

    alert(
      "Title and content required"
    );

    isUploading = false;

    return;

  }

  try {

    const formData =
      new FormData();

    formData.append(
      "title",
      title
    );

    formData.append(
      "content",
      content
    );

    if (selectedFile) {

      formData.append(
        "file",
        selectedFile
      );

    }

    let url =
      `${API}/posts`;

    let method =
      "POST";

    // EDIT MODE
    if (editingPostId) {

      url =
        `${API}/posts/${editingPostId}`;

      method =
        "PUT";

    }

    const res =
      await fetch(
        url,
        {
          method,
          headers: {
            Authorization:
              `Bearer ${token}`
          },
          body:
            formData
        }
      );

    const data =
      await res.json();

    if (!res.ok) {

      alert(
        data.error ||
        "Failed"
      );

      return;

    }

    alert(

      editingPostId

      ? "Post updated!"

      : "Post created!"

    );

    // reset
    document
      .getElementById(
        "title"
      )
      .value = "";

    document
      .getElementById(
        "content"
      )
      .value = "";

    removeBtn.onclick();

    // clear edit mode
    localStorage.removeItem(
      "editingPostId"
    );

    // go profile
    window.location.href =
      "profile.html";

  } catch (err) {

    console.log(err);

    alert(
      "Something went wrong"
    );

  } finally {

    isUploading = false;

  }

}


// =====================
// START
// =====================
initUser();

</script>

</body>
</html>
