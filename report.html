<!DOCTYPE html>
<html>
<head>
  <title>Report a Problem - Gprive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

  <!-- Header -->
  <div class="bg-white p-4 shadow flex items-center rounded-xl max-w-xl mx-auto">
    <button onclick="history.back()" class="mr-3 text-xl">←</button>
    <h1 class="font-bold text-lg">Report a Problem</h1>
  </div>

  <!-- Form -->
  <div class="max-w-xl mx-auto mt-4 bg-white p-5 rounded-xl shadow space-y-4">

    <p class="text-gray-600 text-sm">
      Tell us what went wrong. Your report helps us improve Gprive.
    </p>

    <!-- Category -->
    <select class="w-full p-3 border rounded">
      <option>Select issue type</option>
      <option>Bug / Error</option>
      <option>Account Issue</option>
      <option>Privacy Concern</option>
      <option>Spam or Abuse</option>
      <option>Other</option>
    </select>

    <!-- Title -->
    <input 
      class="w-full p-3 border rounded"
      placeholder="Short title (e.g. App not loading)"
    />

    <!-- Description -->
    <textarea 
      class="w-full p-3 border rounded h-40"
      placeholder="Describe the issue in detail..."
    ></textarea>

    <!-- Screenshot upload (UI only) -->
    <input type="file" class="w-full border p-2 rounded">

    <!-- Submit -->
    <button 
      onclick="submitReport()"
      class="w-full bg-red-600 text-white p-3 rounded">
      Submit Report
    </button>

    <p class="text-xs text-gray-500 text-center">
      We usually respond within 24–48 hours.
    </p>

  </div>

  <script>
    function submitReport() {
      alert("Report submitted successfully (UI only). Connect to backend later.");
      history.back();
    }
  </script>

</body>
</html>
