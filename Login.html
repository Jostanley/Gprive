<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Center content -->
  <div class="flex flex-1 items-center justify-center p-4">

    <div class="bg-white p-6 rounded-xl shadow w-80">

      <h2 class="text-xl font-bold mb-4 text-center">Login</h2>

      <input id="login-email" type="email"
        placeholder="Email"
        class="w-full p-2 border mb-3 rounded">

      <div class="relative mb-3">

  <input id="password"
    type="password"
    placeholder="Password"
    class="w-full p-2 border rounded pr-10">

  <!-- Toggle Button -->
  <button 
    type="button"
    onclick="togglePassword(this)"
    class="absolute right-2 top-2 text-sm text-gray-600">
    Show
  </button>

</div>

      <button onclick="login()"
        class="w-full bg-blue-500 text-white p-2 rounded">
        Login
      </button>

      <p class="text-center mt-3 text-sm">
        <a href="Register.html" class="text-blue-500">Register</a> |
        <a href="Reset.html" class="text-blue-500">Forgot Password</a>
      </p>

      <p id="msg" class="text-center mt-2 text-sm"></p>

    </div>

  </div>

  <!-- FOOTER (fixed bottom, correct version) -->
  <div class="bg-white border-t p-4 text-center text-sm text-gray-500 mb-4">

    <p>
      By continuing, you agree to Gprive’s
    </p>

    <div class="flex justify-center gap-3 text-blue-600 mt-1">
      <a href="terms.html" class="underline">Terms</a>
      <span>•</span>
      <a href="privacy-policy.html" class="underline">Privacy</a>
      <span>•</span>
      <a href="help.html" class="underline">Help</a>
    </div>

    <p class="text-xs text-gray-400 mt-2">
      © 2026 Gprive. All rights reserved.
    </p>

  </div>

  <script>
const supabasejs = window.supabase.createClient(
  "https://edvwiqmydmxttviflouj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
);

async function login() {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if (!email || !password) {
    msg.innerText = "Fill in all fields";
    msg.style.color = "red";
    return;
  }

  const { data, error } =
    await supabasejs.auth.signInWithPassword({
      email,
      password
    });

  if (error) {
    msg.innerText = error.message;
    msg.style.color = "red";
    return;
  }

  const userId = data.user.id;

  const { data: user, error: userError } =
    await supabasejs
      .from("users")
      .select("is_admin")
      .eq("id", userId)
      .single();

  if (userError) {
    console.error(userError);
    email.value ="";
  password.value = "";
    msg.innerText = "Unable to load user data";
    msg.style.color = "red";
    return;
  }

  if (user?.is_admin) {
    email.value ="";
  password.value = "";
    window.location.href = "/admindashboard.html";
    return;
  }
 email.value ="";
  password.value = "";
  msg.innerText = "Login successful!";
  msg.style.color = "green";

  setTimeout(() => {
    window.location.href = "index.html";
  }, 1000);
}

function togglePassword(btn) {
  const input = document.getElementById("password");

  if (input.type === "password") {
    input.type = "text";
    btn.innerText = "Hide";
  } else {
    input.type = "password";
    btn.innerText = "Show";
  }
}
</script>
</body>
</html>
