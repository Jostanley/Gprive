<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded-xl shadow w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Create Account</h2>

    <input id="reg-email" type="email"
      placeholder="Email"
      class="w-full p-2 border mb-3 rounded">

    <input id="reg-password" type="password"
      placeholder="Password"
      class="w-full p-2 border mb-3 rounded">

    <button onclick="register()"
      class="w-full bg-green-500 text-white p-2 rounded">
      Register
    </button>

    <p class="text-center mt-3 text-sm">
      <a href="login.html" class="text-blue-500">Already have an account? Login</a>
    </p>

    <p id="msg" class="text-center mt-2"></p>
  </div>

  <script>
    // Supabase setup
    const supabasejs = window.supabase.createClient(
     "https://bfsdkiugfbsykuwviqsl.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmc2RraXVnZmJzeWt1d3ZpcXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY5MjcsImV4cCI6MjA5MTQ3MjkyN30._JC7N3wGJ04Wr8ylQwiIIkydgFRM7D81mPLr0CsNhyc" 
    );

    // Register function
    async function register() {
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;
      const msg = document.getElementById("msg");

      msg.innerText = "";

      if (!email || !password) {
        msg.innerText = "Please fill in all fields";
        msg.style.color = "red";
        return;
      }

      const { data, error } = await supabasejs.auth.signUp({
        email,
        password
      });

      if (error) {
        msg.innerText = error.message;
        msg.style.color = "red";
        return;
      }

      msg.innerText = "Account created! Check your email to verify.";
      msg.style.color = "green";
    }
  </script>

</body>
</html>
