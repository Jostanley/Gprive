<!DOCTYPE html>
<html>
<head>
  <title>Register - Gprive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- CENTER FORM -->
  <div class="flex flex-1 items-center justify-center p-4">

    <div class="bg-white p-6 rounded-xl shadow w-80">

      <h2 class="text-xl font-bold mb-4 text-center">Create Account</h2>

      <!-- EMAIL -->
      <input id="email" type="email"
        placeholder="Email"
        class="w-full p-2 border mb-3 rounded">

      <!-- PASSWORD -->
      <div class="relative mb-3">

  <input id="password"
    type="password"
    placeholder="Password"
    class="w-full p-2 border rounded pr-10">

  <!-- Toggle Button -->
  <button 
    type="button"
    onclick="togglePassword()"
    class="absolute right-2 top-2 text-sm text-gray-600">
    Show
  </button>

</div>

      <!-- DOB -->
      <label class="text-sm text-gray-600">Date of Birth</label>
      <input id="dob" type="date"
        class="w-full p-2 border mb-3 rounded">

      <button onclick="register()"
        class="w-full bg-green-500 text-white p-2 rounded">
        Register
      </button>

      <p class="text-center mt-3 text-sm">
        <a href="Login.html" class="text-blue-500">
          Already have an account? Login
        </a>
      </p>

      <p id="msg" class="text-center mt-2 text-sm"></p>

    </div>

  </div>

  <!-- FOOTER -->
  <div class="bg-white border-t p-4 text-center text-sm text-gray-500">

    <p>By continuing, you agree to Gprive’s</p>

    <div class="flex justify-center gap-3 text-blue-600 mt-1">
      <a href="terms.html" class="underline">Terms</a>
      <span>•</span>
      <a href="privacy-policy.html" class="underline">Privacy</a>
      <span>•</span>
      <a href="help-center.html" class="underline">Help</a>
    </div>

    <p class="text-xs text-gray-400 mt-2">
      © 2026 Gprive. All rights reserved.
    </p>

  </div>

  <script>
    const supabasejs = window.supabase.createClient(
          "https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
    );

    // Set max DOB (18+ rule)
    const dobInput = document.getElementById("dob");
    const today = new Date();
    const minAgeDate = new Date(
      today.getFullYear() - 18,
      today.getMonth(),
      today.getDate()
    );
    dobInput.max = minAgeDate.toISOString().split("T")[0];

    async function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const dob = document.getElementById("dob").value;
      const msg = document.getElementById("msg");

      msg.innerText = "";

      if (!email || !password || !dob) {
        msg.innerText = "Please fill in all fields";
        msg.style.color = "red";
        return;
      }

      // Extra safety check (real validation)
      const birthDate = new Date(dob);
      const age = new Date().getFullYear() - birthDate.getFullYear();

      if (age < 18) {
        msg.innerText = "You must be at least 18 years old";
        msg.style.color = "red";
        return;
      }

      const { data, error } = await supabasejs.auth.signUp({
        email,
        password
      });

      if (error) {
        email.value ="";
        password.value = "";
        msg.innerText = error.message;
        msg.style.color = "red";
        return;
      }
      email.value ="";
      password.value = "";
      msg.innerText = "Account created! Check your email.";
      msg.style.color = "green";
    }
    
    
    
  function togglePassword() {
    const input = document.getElementById("password");
    const btn = event.target;

    if (input.type === "password") {
      input.type = "text";
      btn.innerText = "Hide";
    } else {
      input.type = "password";
      btn.innerText = "Show";
    }
  }

  </script>

</body>
</html>
