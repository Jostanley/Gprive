<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded-xl shadow w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Create Account</h2>

    <input id="reg-email" type="email"
      placeholder="Email"
      class="w-full p-2 border mb-3 rounded">

    <input id="reg-password" type="password"
      placeholder="Password"
      class="w-full p-2 border mb-3 rounded">
      

 <input type="date" id="dob" />

<script>
  const dobInput = document.getElementById("dob");

  const today = new Date();

  // Subtract 18 years
  const minAgeDate = new Date(
    today.getFullYear() - 18,
    today.getMonth(),
    today.getDate()
  );

  // Format to YYYY-MM-DD
  const formattedDate = minAgeDate.toISOString().split("T")[0];

  // Set max attribute (latest selectable date)
  dobInput.max = formattedDate;
</script>
   <button onclick="register()"
      class="w-full bg-green-500 text-white p-2 rounded">
      Register
    </button>

    <p class="text-center mt-3 text-sm">
      <a href="Login.html" class="text-blue-500">Already have an account? Login</a>
    </p>

    <p id="msg" class="text-center mt-2"></p>
  </div>

  <script>
    // Supabase setup
    const supabasejs = window.supabase.createClient(
   "https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
    );

    // Register function
    async function register() {
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;
      const msg = document.getElementById("msg");

      msg.innerText = "";

      if (!email || !password) {
        msg.innerText = "Please fill in all fields";
        msg.style.color = "red";
        return;
      }

      const { data, error } = await supabasejs.auth.signUp({
        email,
        password
      });

      if (error) {
        msg.innerText = error.message;
        msg.style.color = "red";
        return;
      }

      msg.innerText = "Account created! Check your email to verify.";
      msg.style.color = "green";
    }
  </script>

</body>
</html>
