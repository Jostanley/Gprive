<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Clone</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex bg-gray-100">

  <!-- LEFT SIDEBAR -->
  <div class="w-1/3 bg-white border-r overflow-y-auto" id="chatList">
    <div class="p-4 font-bold text-lg border-b">Chats</div>
  </div>

  <!-- RIGHT CHAT -->
  <div class="flex-1 flex flex-col">

    <div class="p-4 bg-white border-b font-bold" id="chatHeader">
      Select a chat
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

    <div class="p-3 bg-white flex gap-2 border-t">
      <input id="msgInput" class="flex-1 border rounded-full px-4 py-2" placeholder="Message..." />
      <button id="sendBtn" class="bg-green-600 text-white px-5 rounded-full">
        Send
      </button>
    </div>

  </div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://edvwiqmydmxttviflouj.supabase.co",
  "YOUR_ANON_KEY"
);

// =====================
// GLOBAL STATE
// =====================
let activeUser = null;
let currentChatUser = null;
let channel = null;

// =====================
// INIT
// =====================
window.onload = async () => {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    alert("Login required");
    return;
  }

  activeUser = String(session.user.id);

  const params = new URLSearchParams(window.location.search);
  currentChatUser =
    params.get("otherUserId") ||
    params.get("chatUser") ||
    params.get("userId");

  if (currentChatUser) {
    currentChatUser = String(currentChatUser);
  }

  await loadChats();

  if (currentChatUser) {
    openChat(currentChatUser);
  }
};

// =====================
// CHAT LIST
// =====================
async function loadChats() {
  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .or(`sender_id.eq.${activeUser},receiver_id.eq.${activeUser}`)
    .order("created_at", { ascending: false });

  if (error) return console.log(error);

  const map = new Map();

  data.forEach(msg => {
    const otherUser =
      msg.sender_id === activeUser
        ? msg.receiver_id
        : msg.sender_id;

    if (!map.has(otherUser)) {
      map.set(otherUser, msg);
    }
  });

  const list = document.getElementById("chatList");
  list.innerHTML = `<div class="p-4 font-bold border-b">Chats</div>`;

  if (map.size === 0) {
    list.innerHTML += `
      <div class="p-4 text-gray-500 text-sm">
        No chats yet
      </div>
    `;
    return;
  }

  map.forEach((msg, userId) => {
    const div = document.createElement("div");
    div.className = "p-4 border-b cursor-pointer hover:bg-gray-100";

    div.innerHTML = `
      <div class="font-semibold">User ${userId}</div>
      <div class="text-sm text-gray-500 truncate">${msg.message}</div>
    `;

    div.onclick = () => openChat(userId);

    list.appendChild(div);
  });
}

// =====================
// OPEN CHAT
// =====================
function openChat(userId) {
  currentChatUser = String(userId);

  const url = new URL(window.location);
  url.searchParams.set("otherUserId", userId);
  window.history.pushState({}, "", url);

  document.getElementById("chatHeader").textContent =
    "Chat with User " + userId;

  document.getElementById("messages").innerHTML = "";

  loadMessages(userId);
  listenMessages();
}

// =====================
// LOAD SINGLE CHAT
// =====================
async function loadMessages(userId) {
  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .or(
      `and(sender_id.eq.${activeUser},receiver_id.eq.${userId}),
       and(sender_id.eq.${userId},receiver_id.eq.${activeUser})`
    )
    .order("created_at", { ascending: true });

  if (error) return console.log(error);

  const box = document.getElementById("messages");
  box.innerHTML = "";

  if (!data || data.length === 0) {
    box.innerHTML = `
      <div class="flex flex-col items-center justify-center h-full text-gray-500 gap-2">
        <p>No messages yet</p>
        <p class="text-sm">Start a chat</p>
      </div>
    `;
    return;
  }

  data.forEach(renderMessage);

  box.scrollTop = box.scrollHeight;
}

// =====================
// RENDER MESSAGE
// =====================
function renderMessage(msg) {
  const text =
    typeof msg.message === "object"
      ? msg.message.text || msg.message.content || JSON.stringify(msg.message)
      : msg.message;

  const isMe = String(msg.sender_id) === activeUser;

  const wrapper = document.createElement("div");
  wrapper.className = `flex ${isMe ? "justify-end" : "justify-start"}`;

  wrapper.innerHTML = `
    <div class="${isMe ? "bg-green-600 text-white" : "bg-gray-200"} px-4 py-2 rounded-2xl max-w-[70%]">
      ${text}
    </div>
  `;

  document.getElementById("messages").appendChild(wrapper);
}

// =====================
// REALTIME
// =====================
function listenMessages() {
  if (channel) supabase.removeChannel(channel);

  channel = supabase
    .channel("chat-room")
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "messages" },
      payload => {
        const m = payload.new;

        const match =
          (String(m.sender_id) === activeUser &&
            String(m.receiver_id) === currentChatUser) ||
          (String(m.sender_id) === currentChatUser &&
            String(m.receiver_id) === activeUser);

        if (match) renderMessage(m);
      }
    )
    .subscribe();
}

// =====================
// SEND MESSAGE
// =====================
document.getElementById("sendBtn").onclick = async () => {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentChatUser) return;

  const { error } = await supabase.from("messages").insert({
    sender_id: activeUser,
    receiver_id: currentChatUser,
    message: text
  });

  if (error) return console.log(error);

  input.value = "";
};

// ENTER KEY
document.getElementById("msgInput").addEventListener("keypress", e => {
  if (e.key === "Enter") {
    document.getElementById("sendBtn").click();
  }
});

</script>

</body>
</html>
