<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Clone (Final)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex bg-gray-100">

  <!-- LEFT SIDEBAR -->
  <div class="w-1/3 bg-white border-r overflow-y-auto" id="chatList">
    <div class="p-4 font-bold text-lg border-b">Chats</div>
  </div>

  <!-- RIGHT CHAT AREA -->
  <div class="flex-1 flex flex-col">

    <div class="p-4 bg-white border-b font-bold" id="chatHeader">
      Select a chat
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

    <div class="p-3 bg-white flex gap-2 border-t">
      <input id="msgInput" class="flex-1 border rounded-full px-4 py-2" placeholder="Message..." />
      <button id="sendBtn" class="bg-green-600 text-white px-5 rounded-full">
        Send
      </button>
    </div>

  </div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

console.log("🚀 App started");

// =====================
// SUPABASE INIT
// =====================
const supabase = createClient(
  "https://bfsdkiugfbsykuwviqsl.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmc2RraXVnZmJzeWt1d3ZpcXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY5MjcsImV4cCI6MjA5MTQ3MjkyN30._JC7N3wGJ04Wr8ylQwiIIkydgFRM7D81mPLr0CsNhyc"
);

let activeUser = null;
let currentSender = null;
let channel = null;

// =====================
// INIT SESSION
// =====================
window.onload = async () => {

  const { data, error } = await supabase.auth.getSession();

  console.log("SESSION:", data, error);

  if (!data?.session) {
    alert("Login required");
    return;
  }

  activeUser = String(data.session.user.id);
  console.log("USER:", activeUser);

  const params = new URLSearchParams(window.location.search);
  currentSender = params.get("userId");

  await loadChats();

  if (currentSender) openChat(currentSender);
};

// =====================
// LOAD CHAT LIST
// =====================
async function loadChats() {

  const { data } = await supabase
    .from("messages")
    .select("*")
    .order("id", { ascending: false });

  const usersMap = new Map();

  data?.forEach(m => {

    if (
      String(m.sender_id) !== activeUser &&
      String(m.receiver_id) !== activeUser
    ) return;

    const otherUser =
      String(m.sender_id) === activeUser
        ? String(m.receiver_id)
        : String(m.sender_id);

    if (!usersMap.has(otherUser)) {
      usersMap.set(otherUser, m);
    }
  });

  const list = document.getElementById("chatList");
  list.innerHTML = `<div class="p-4 font-bold border-b">Chats</div>`;

  usersMap.forEach((msg, userId) => {

    const div = document.createElement("div");
    div.className = "p-4 border-b cursor-pointer hover:bg-gray-100";

    const name = document.createElement("div");
    name.className = "font-semibold";
    name.textContent = "User " + userId;

    const preview = document.createElement("div");
    preview.className = "text-sm text-gray-500 truncate";
    preview.textContent = msg.message;

    div.appendChild(name);
    div.appendChild(preview);

    div.onclick = () => openChat(userId);

    list.appendChild(div);
  });
}

// =====================
// OPEN CHAT
// =====================
function openChat(userId) {

  currentSender = String(userId);

  document.getElementById("chatHeader").textContent =
    "Chat Anonymously ;

  document.getElementById("messages").innerHTML = "";

  loadMessages(userId);
  listenMessages(userId);
}

// =====================
// LOAD MESSAGES
// =====================
async function loadMessages(userId) {

  const { data } = await supabase
    .from("messages")
    .select("*")
    .order("id");

  const filtered = data?.filter(m =>
    (String(m.sender_id) === activeUser && String(m.receiver_id) === String(userId)) ||
    (String(m.sender_id) === String(userId) && String(m.receiver_id) === activeUser)
  );

  document.getElementById("messages").innerHTML = "";

  filtered?.forEach(appendMessage);
}

// =====================
// APPEND MESSAGE
// =====================
function appendMessage(msg) {

  const isMe = String(msg.sender_id) === activeUser;

  const wrapper = document.createElement("div");
  wrapper.className = `flex ${isMe ? "justify-end" : "justify-start"}`;

  const bubble = document.createElement("div");
  bubble.className = `px-4 py-2 rounded-2xl text-sm max-w-[70%] ${
    isMe ? "bg-green-600 text-white" : "bg-gray-200"
  }`;

  bubble.textContent = msg.message;

  wrapper.appendChild(bubble);

  const box = document.getElementById("messages");
  box.appendChild(wrapper);

  box.scrollTop = box.scrollHeight;
}

// =====================
// REALTIME
// =====================
function listenMessages(userId) {

  if (channel) supabase.removeChannel(channel);

  channel = supabase
    .channel("chat")
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "messages" },
      (payload) => {

        const m = payload.new;

        const isMatch =
          (String(m.sender_id) === activeUser && String(m.receiver_id) === String(userId)) ||
          (String(m.sender_id) === String(userId) && String(m.receiver_id) === activeUser);

        if (isMatch) appendMessage(m);
      }
    )
    .subscribe();

  console.log("Realtime active");
}

// =====================
// SEND MESSAGE
// =====================
document.getElementById("sendBtn").onclick = async () => {

  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentSender) return;

  const { error } = await supabase
    .from("messages")
    .insert({
      sender_id: activeUser,
      receiver_id: currentSender,
      message: text
    });

  console.log("SEND ERROR:", error);

  input.value = "";
};

// ENTER KEY
document.getElementById("msgInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    document.getElementById("sendBtn").click();
  }
});

</script>

</body>
</html>
