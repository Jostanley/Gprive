<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex bg-gray-100 overflow-hidden">

  <!-- LEFT CHAT LIST -->
  <div class="w-1/3 bg-white border-r overflow-y-auto" id="chatList">

    <div class="p-4 font-bold border-b">
      Chats
    </div>

    <div class="p-4 text-gray-400">
      Loading chats...
    </div>

  </div>

  <!-- RIGHT CHAT -->
  <div class="flex-1 flex flex-col">

    <!-- HEADER -->
    <div
      class="p-4 bg-white border-b"
      id="chatHeader"
    >
      Select a chat
    </div>

    <!-- MESSAGES -->
    <div
      id="messages"
      class="flex-1 overflow-y-auto p-4 flex flex-col"
    ></div>

    <!-- INPUT -->
    <div class="p-3 bg-white flex gap-2 border-t">

      <input
        id="msgInput"
        class="flex-1 border rounded-full px-4 py-2 outline-none"
        placeholder="Message..."
      />

      <button
        id="sendBtn"
        class="bg-green-600 text-white px-5 rounded-full"
      >
        Send
      </button>

    </div>

  </div>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// =====================
// SUPABASE
// =====================
const supabase = createClient(
      "https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
);

// =====================
// STATE
// =====================
let activeUser = null;
let currentUser = null;
let channel = null;

// =====================
// INIT
// =====================
window.onload = async () => {

  try {

    const {
      data: { session }
    } = await supabase.auth.getSession();

    if (!session) {
      if (confirm("Login required")) {
      window.location.href = "Login.html";
    }
    return;

    }

    activeUser = String(session.user.id);

    // SET ONLINE
    await supabase
      .from("users")
      .upsert({
        id: activeUser,
        online: true,
        last_seen: new Date().toISOString()
      });

    // OFFLINE WHEN TAB CLOSES
    window.addEventListener(
      "beforeunload",
      async () => {

        await supabase
          .from("users")
          .update({
            online: false,
            last_seen: new Date().toISOString()
          })
          .eq("id", activeUser);
      }
    );

    // URL PARAMS
    const params = new URLSearchParams(
      window.location.search
    );

    currentUser =
      params.get("chatUser") ||
      params.get("userId");

    if (currentUser) {
      currentUser = String(currentUser);
    }

    await loadChats();

    if (currentUser) {
      openChat(currentUser);
    }

    listenUserStatus();

  } catch (err) {

    console.error(err);

    alert("App failed to load");
  }
};

// =====================
// LOAD CHATS
// =====================
async function loadChats() {

  const list =
    document.getElementById("chatList");

  list.innerHTML = `
    <div class="p-4 font-bold border-b">
      Chats
    </div>

    <div class="p-4 text-gray-400">
      Loading...
    </div>
  `;

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("id", { ascending: false });

  if (error) {

    list.innerHTML = `
      <div class="p-4 text-red-500">
        Failed to load chats
      </div>
    `;

    return;
  }

  const map = new Map();

  data.forEach(m => {

    if (
      String(m.sender_id) !== activeUser &&
      String(m.receiver_id) !== activeUser
    ) return;

    const otherUser =
      String(m.sender_id) === activeUser
        ? String(m.receiver_id)
        : String(m.sender_id);

    if (!map.has(otherUser)) {
      map.set(otherUser, m);
    }
  });

  list.innerHTML = `
    <div class="p-4 font-bold border-b">
      Chats
    </div>
  `;

  if (map.size === 0) {

    list.innerHTML += `
      <div class="p-4 text-gray-400">
        No chats yet
      </div>
    `;

    return;
  }

  for (const [userId, msg] of map) {

    const { data: user } = await supabase
      .from("users")
      .select("online,last_seen")
      .eq("id", userId)
      .single();

    let status = "Offline";

    if (user) {

      if (user.online) {

        status = `
          <span class="text-green-600">
            Online
          </span>
        `;

      } else if (user.last_seen) {

        status = `
          <span class="text-gray-400">
            Last seen ${timeAgo(user.last_seen)}
          </span>
        `;
      }
    }

    const div =
      document.createElement("div");

    div.className =
      "p-4 border-b cursor-pointer hover:bg-gray-100";

    div.innerHTML = `
      <div class="flex justify-between items-center">

        <div class="font-semibold">
          User ${userId}
        </div>

        <div class="text-xs">
          ${status}
        </div>

      </div>

      <div class="text-sm text-gray-500 truncate">
        ${msg.message}
      </div>
    `;

    div.onclick = () => {
      openChat(userId);
    };

    list.appendChild(div);
  }
}

// =====================
// OPEN CHAT
// =====================
async function openChat(userId) {

  currentUser = String(userId);

  const { data: user } = await supabase
    .from("users")
    .select("*")
    .eq("id", userId)
    .single();

  let status = "Offline";

  if (user) {

    if (user.online) {

      status = `
        <span class="text-green-600 text-sm">
          Online
        </span>
      `;

    } else if (user.last_seen) {

      status = `
        <span class="text-gray-500 text-sm">
          Last seen ${timeAgo(user.last_seen)}
        </span>
      `;
    }
  }

  document.getElementById(
    "chatHeader"
  ).innerHTML = `

    <div>
      <div class="font-bold">
        Anonymous user
      </div>

      ${status}
    </div>
  `;

  document.getElementById(
    "messages"
  ).innerHTML = `
    <div class="text-center text-gray-400 p-4">
      Loading messages...
    </div>
  `;

  loadMessages(userId);

  listenMessages(userId);
}

// =====================
// LOAD MESSAGES
// =====================
async function loadMessages(userId) {

  const box =
    document.getElementById("messages");

  // MARK AS SEEN
  await supabase
    .from("messages")
    .update({ seen: true })
    .eq("sender_id", userId)
    .eq("receiver_id", activeUser)
    .eq("seen", false);

  const filter =
    `and(sender_id.eq.${activeUser},receiver_id.eq.${userId}),` +
    `and(sender_id.eq.${userId},receiver_id.eq.${activeUser})`;

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .or(filter)
    .order("id", { ascending: true });

  if (error) {

    box.innerHTML = `
      <div class="text-red-500 text-center p-4">
        Failed to load messages
      </div>
    `;

    return;
  }

  if (!data || data.length === 0) {

    box.innerHTML = `
      <div class="text-gray-400 text-center">
        No messages yet
      </div>
    `;

    return;
  }

  box.innerHTML = "";

  data.forEach(renderMessage);

  box.scrollTop = box.scrollHeight;
}

// =====================
// RENDER MESSAGE
// =====================
function renderMessage(msg) {

  const isMe =
    String(msg.sender_id) === activeUser;

  const exists =
    document.querySelector(
      `[data-id="${msg.id}"]`
    );

  if (exists) return;

  const wrapper =
    document.createElement("div");

  wrapper.className =
    `flex mb-2 ${
      isMe
        ? "justify-end"
        : "justify-start"
    }`;

  wrapper.setAttribute(
    "data-id",
    msg.id
  );

  const bubble =
    document.createElement("div");

  bubble.className = `
    ${
      isMe
        ? "bg-green-600 text-white"
        : "bg-gray-200 text-black"
    }

    px-4
    py-2
    rounded-2xl
    text-sm
    max-w-[70%]
    break-words
  `;

  const text =
    document.createElement("p");

  text.textContent =
    msg.message;

  const bottom =
    document.createElement("div");

  bottom.className =
    "flex items-center justify-end gap-1 mt-1 text-xs opacity-70";

  const time =
    document.createElement("span");

  time.textContent =
    timeAgo(msg.created_at);

  bottom.appendChild(time);

  if (isMe) {

    const tick =
      document.createElement("span");

    tick.className =
      "seen-tick";

    tick.textContent =
      msg.seen ? "✓✓" : "✓";

    bottom.appendChild(tick);
  }

  bubble.appendChild(text);
  bubble.appendChild(bottom);

  wrapper.appendChild(bubble);

  document
    .getElementById("messages")
    .appendChild(wrapper);

  const box =
    document.getElementById("messages");

  box.scrollTop =
    box.scrollHeight;
}

// =====================
// REALTIME MESSAGES
// =====================
function listenMessages(userId) {

  if (channel) {
    supabase.removeChannel(channel);
  }

  channel = supabase
    .channel("chat-room")

    // INSERT
    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "messages"
      },

      payload => {

        const m = payload.new;

        const match =

          (
            String(m.sender_id) === activeUser &&
            String(m.receiver_id) === userId
          )

          ||

          (
            String(m.sender_id) === userId &&
            String(m.receiver_id) === activeUser
          );

        if (!match) return;

        renderMessage(m);

        loadChats();

        // AUTO SEEN
        if (
          String(m.receiver_id) === activeUser
        ) {

          supabase
            .from("messages")
            .update({
              seen: true
            })
            .eq("id", m.id);
        }
      }
    )

    // UPDATE
    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "messages"
      },

      payload => {

        const m = payload.new;

        const el =
          document.querySelector(
            `[data-id="${m.id}"]`
          );

        if (!el) return;

        const tick =
          el.querySelector(".seen-tick");

        if (
          tick &&
          String(m.sender_id) === activeUser
        ) {

          tick.textContent =
            m.seen ? "✓✓" : "✓";
        }
      }
    )

    .subscribe();
}

// =====================
// REALTIME USER STATUS
// =====================
function listenUserStatus() {

  supabase
    .channel("online-users")

    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "users"
      },

      payload => {

        const user = payload.new;

        if (
          String(user.id) !== currentUser
        ) return;

        let status = "Offline";

        if (user.online) {

          status = `
            <span class="text-green-600 text-sm">
              Online
            </span>
          `;

        } else {

          status = `
            <span class="text-gray-500 text-sm">
              Last seen ${timeAgo(user.last_seen)}
            </span>
          `;
        }

        document.getElementById(
          "chatHeader"
        ).innerHTML = `
          <div>
            <div class="font-bold">
              User ${currentUser}
            </div>

            ${status}
          </div>
        `;

        loadChats();
      }
    )

    .subscribe();
}

// =====================
// SEND MESSAGE
// =====================
document
.getElementById("sendBtn")
.onclick = async () => {

  const input =
    document.getElementById("msgInput");

  const text =
    input.value.trim();

  if (!text) return;

  if (!currentUser) {

    alert("Select a chat first");

    return;
  }

  const { error } = await supabase
    .from("messages")
    .insert({

      sender_id: activeUser,
      receiver_id: currentUser,
      message: text,
      seen: false
    });

  if (error) {

    console.log(error);

    alert("Failed to send");

    return;
  }

  input.value = "";
};

// =====================
// ENTER KEY
// =====================
document
.getElementById("msgInput")
.addEventListener("keypress", e => {

  if (e.key === "Enter") {

    document
      .getElementById("sendBtn")
      .click();
  }
});

// =====================
// TIME AGO
// =====================
function timeAgo(date) {

  const seconds =
    Math.floor(
      (new Date() - new Date(date)) / 1000
    );

  if (seconds < 60) {
    return "Just now";
  }

  const units = [

    ["year", 31536000],
    ["month", 2592000],
    ["day", 86400],
    ["hour", 3600],
    ["minute", 60]

  ];

  for (let [label, sec] of units) {

    const count =
      Math.floor(seconds / sec);

    if (count > 0) {

      return `
        ${count}
        ${label}
        ${count > 1 ? "s" : ""}
        ago
      `;
    }
  }

  return "Just now";
}

</script>

</body>
</html>
