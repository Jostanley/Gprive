<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex bg-gray-100">

  <!-- LEFT CHAT LIST -->
  <div class="w-1/3 bg-white border-r overflow-y-auto" id="chatList">
    <div class="p-4 font-bold border-b">Chats</div>
    <div class="p-4 text-gray-400">Loading chats...</div>
  </div>

  <!-- RIGHT CHAT -->
  <div class="flex-1 flex flex-col">

    <div class="p-4 bg-white border-b font-bold" id="chatHeader">
      Select a chat
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

    <div class="p-3 bg-white flex gap-2 border-t">
      <input id="msgInput" class="flex-1 border rounded-full px-4 py-2" placeholder="Message..." />
      <button id="sendBtn" class="bg-green-600 text-white px-5 rounded-full">
        Send
      </button>
    </div>

  </div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// =====================
// SUPABASE
// =====================
const supabase = createClient(
  "https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
);

// =====================
// STATE
// =====================
let activeUser = null;
let currentUser = null;
let channel = null;

// =====================
// INIT
// =====================
window.onload = async () => {

  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    if (confirm("Login required")) {
      window.location.href = "Login.html";
    }
    return;
  }

  activeUser = String(session.user.id);

  const params = new URLSearchParams(window.location.search);
  currentUser = params.get("chatUser") || params.get("userId");

  if (currentUser) currentUser = String(currentUser);

  await loadChats();

  if (currentUser) openChat(currentUser);
};

// =====================
// LOAD CHAT LIST
// =====================
async function loadChats() {

  const list = document.getElementById("chatList");

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    list.innerHTML += `<div class="p-4 text-red-500">Failed to load chats</div>`;
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML += `<div class="p-4 text-gray-500">No chats found</div>`;
    return;
  }

  const map = new Map();

  data.forEach(m => {

    if (
      String(m.sender_id) !== activeUser &&
      String(m.receiver_id) !== activeUser
    ) return;

    const otherUser =
      String(m.sender_id) === activeUser
        ? String(m.receiver_id)
        : String(m.sender_id);

    if (!map.has(otherUser)) {
      map.set(otherUser, m);
    }
  });

  if (map.size === 0) {
    list.innerHTML += `<div class="p-4 text-gray-500">No active chats</div>`;
    return;
  }

  list.innerHTML = `<div class="p-4 font-bold border-b">Chats</div>`;

  map.forEach((msg, userId) => {

    const div = document.createElement("div");
    div.className = "p-4 border-b cursor-pointer hover:bg-gray-100";

    div.innerHTML = `
      <div class="font-semibold">User ${userId}</div>
      <div class="text-sm text-gray-500 truncate">${msg.message}</div>
    `;

    div.onclick = () => openChat(userId);

    list.appendChild(div);
  });
}

// =====================
// OPEN CHAT
// =====================
function openChat(userId) {

  currentUser = String(userId);

  document.getElementById("chatHeader").textContent =
    "Chat with User " + userId;

  document.getElementById("messages").innerHTML = `
    <div class="text-gray-400 text-center p-4">Loading messages...</div>
  `;

  loadMessages(userId);
  listenMessages(userId);
}

// =====================
// LOAD MESSAGES (CORE LOGIC)
// =====================
async function loadMessages(userId) {

  const box = document.getElementById("messages");

  const { data, error } = await supabase
  .from("messages")
  .select("*")
  .in("sender_id", [activeUser, userId])
  .in("receiver_id", [activeUser, userId])
  .order("id", { ascending: true });

  if (error) {
    box.innerHTML = `<div class="text-red-500 text-center p-4">Failed to load messages</div>`;
    console.log(JSON.stringify(error, null, 2) );
    return;
  }

  if (!data || data.length === 0) {
    box.innerHTML = `
      <div class="flex flex-col items-center justify-center h-full text-gray-400">
        <p>No messages yet</p>
        <p class="text-sm">Start the conversation</p>
      </div>
    `;
    return;
  }

  box.innerHTML = "";
  data.forEach(renderMessage);

  box.scrollTop = box.scrollHeight;
}

// =====================
// RENDER MESSAGE
// =====================
function renderMessage(msg) {

  const isMe = String(msg.sender_id) === activeUser;

  const wrapper = document.createElement("div");
  wrapper.className = `flex ${isMe ? "justify-end" : "justify-start"}`;

  wrapper.innerHTML = `
    <div class="${isMe ? "bg-green-600 text-white" : "bg-gray-200"} px-4 py-2 rounded-2xl text-sm max-w-[70%]">
      ${msg.message}
    </div>
  `;

  document.getElementById("messages").appendChild(wrapper);
}

// =====================
// REALTIME
// =====================
function listenMessages(userId) {

  if (channel) supabase.removeChannel(channel);

  channel = supabase
    .channel("chat-room")
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "messages" },
      payload => {

        const m = payload.new;

        const match =
          (String(m.sender_id) === activeUser && String(m.receiver_id) === userId) ||
          (String(m.sender_id) === userId && String(m.receiver_id) === activeUser);

        if (match) renderMessage(m);
      }
    )
    .subscribe();
}

// =====================
// SEND MESSAGE
// =====================
document.getElementById("sendBtn").onclick = async () => {

  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentUser) {
    alert("Select a chat first");
    return;
  }

  const { error } = await supabase.from("messages").insert({
    sender_id: activeUser,
    receiver_id: currentUser,
    message: text
  });

  if (error) {
    alert("Failed to send message");
    console.log(error);
    return;
  }

  input.value = "";
};

// ENTER KEY
document.getElementById("msgInput").addEventListener("keypress", e => {
  if (e.key === "Enter") {
    document.getElementById("sendBtn").click();
  }
});

</script>

</body>
</html>
