// =====================
// LOAD CHATS (FIXED)
// =====================
async function loadChats() {

  const list = document.getElementById("chatList");

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .or(`sender_id.eq.${currentUserId},receiver_id.eq.${currentUserId}`)
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    list.innerHTML = `<div class="p-4 text-red-500">Failed to load chats</div>`;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = `<div class="p-4 text-gray-500">No chats yet</div>`;
    return;
  }

  const chatMap = new Map();

  data.forEach(msg => {

    const sender = String(msg.sender_id);
    const receiver = String(msg.receiver_id);
    const me = String(currentUserId);

    const otherUserId = sender === me ? receiver : sender;

    if (!otherUserId || otherUserId === "null") return;

    if (!chatMap.has(otherUserId)) {
      chatMap.set(otherUserId, msg);
    }
  });

  renderChats(chatMap);
}

// =====================
// RENDER CHATS
// =====================
function renderChats(chatMap) {

  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chatMap.forEach((msg, userId) => {

    const preview = msg.message
      ? msg.message.length > 25
        ? msg.message.substring(0, 25) + "..."
        : msg.message
      : "";

    const div = document.createElement("div");

    div.className =
      "p-4 border-b hover:bg-gray-100 cursor-pointer flex justify-between items-center";

    div.innerHTML = `
      <div>
        <div class="font-bold"> Anonymous User</div>
        <div class="text-sm text-gray-500">${preview}</div>
      </div>
      <div class="text-xs text-gray-400">
        ${new Date(msg.created_at).toLocaleDateString()}
      </div>
    `;

    // =====================
    // CLICK HANDLER
    // =====================
    div.onclick = () => {

      if (!userId) {
        console.log("Invalid userid")
        return;
      }

      window.location.href = `message.html?chatUser=${userId}`;
    };

    list.appendChild(div);
  });
}

</script>
