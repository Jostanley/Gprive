<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto bg-white h-screen overflow-y-auto">

  <div class="p-4 font-bold text-xl border-b">
    Chats
  </div>

  <div id="chatList"></div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// =====================
// SUPABASE
// =====================
const supabase = createClient(
  "https://edvwiqmydmxttviflouj.supabase.co",
  "YOUR_ANON_KEY"
);

// =====================
// STATE
// =====================
let currentUserId = null;
let currentUser = null;

// =====================
// INIT
// =====================
window.onload = async () => {

  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    alert("Login required");
    window.location.href = "login.html";
    return;
  }

  currentUserId = String(session.user.id);

  await initUser();
};

// =====================
// INIT USER
// =====================
async function initUser() {

  const { data, error } = await supabase.auth.getUser();

  if (error || !data.user) {
    alert("Not logged in");
    return;
  }

  currentUser = data.user;

  // ONLINE STATUS
  if (!window.presenceStarted) {

    window.presenceStarted = true;

    setInterval(async () => {

      if (!currentUser) return;

      await supabase
        .from("users")
        .update({
          last_seen: new Date().toISOString(),
          is_online: true
        })
        .eq("id", currentUser.id);

    }, 30000);
  }

  loadChats();
}

// =====================
// LOAD CHATS
// =====================
async function loadChats() {

  const list = document.getElementById("chatList");

  list.innerHTML = `
    <div class="p-4 text-gray-400">
      Loading chats...
    </div>
  `;

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .or(`sender_id.eq.${currentUserId},receiver_id.eq.${currentUserId}`)
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);

    list.innerHTML = `
      <div class="p-4 text-red-500">
        Failed to load chats
      </div>
    `;

    return;
  }

  if (!data || data.length === 0) {

    list.innerHTML = `
      <div class="p-4 text-gray-500">
        No chats yet
      </div>
    `;

    return;
  }

  const chatMap = new Map();

  data.forEach(msg => {

    const sender = String(msg.sender_id);
    const receiver = String(msg.receiver_id);

    const otherUserId =
      sender === currentUserId ? receiver : sender;

    if (!chatMap.has(otherUserId)) {
      chatMap.set(otherUserId, msg);
    }

  });

  renderChats(chatMap);
}

// =====================
// RENDER CHATS
// =====================
function renderChats(chatMap) {

  const list = document.getElementById("chatList");

  list.innerHTML = "";

  chatMap.forEach((msg, userId) => {

    const preview = msg.message
      ? msg.message.length > 25
        ? msg.message.substring(0, 25) + "..."
        : msg.message
      : "Media";

    const div = document.createElement("div");

    div.className =
      "p-4 border-b hover:bg-gray-100 cursor-pointer flex justify-between items-center";

    div.innerHTML = `
      <div>
        <div class="font-bold">
          Anonymous User
        </div>

        <div class="text-sm text-gray-500">
          ${preview}
        </div>
      </div>

      <div class="text-xs text-gray-400">
        ${new Date(msg.created_at).toLocaleDateString()}
      </div>
    `;

    div.onclick = () => {
      window.location.href =
        `message.html?chatUser=${userId}`;
    };

    list.appendChild(div);
  });
}

</script>

</body>
</html>
