<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";
const supabase = createClient("https://bfsdkiugfbsykuwviqsl.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmc2RraXVnZmJzeWt1d3ZpcXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY5MjcsImV4cCI6MjA5MTQ3MjkyN30._JC7N3wGJ04Wr8ylQwiIIkydgFRM7D81mPLr0CsNhyc"
);

let currentUserId = null;

window.onload = async () => {
  const { data } = await supabase.auth.getSession();

  if (!data.session) {
    alert("Login required");
    window.location.href = "login.html";
    return;
  }

  currentUserId = data.session.user.id;
  loadChats();
};

// =====================
// LOAD CHATS
// =====================
async function loadChats() {
  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .or(`sender_id.eq.${currentUserId},receiver_id.eq.${currentUserId}`)
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const chatMap = new Map();

  data.forEach(msg => {
    const otherUser =
      msg.sender_id === currentUserId ? msg.receiver_id : msg.sender_id;

    if (!chatMap.has(otherUser)) {
      chatMap.set(otherUser, msg);
    }
  });

  renderChats([...chatMap.values()]);
}

// =====================
// RENDER CHATS
// =====================
function renderChats(chats) {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach(chat => {
    const otherUserId =
      chat.sender_id === currentUserId ? chat.receiver_id : chat.sender_id;

    const preview = chat.message
      ? chat.message.length > 20
        ? chat.message.substring(0, 20) + "..."
        : chat.message
      : "";

    const div = document.createElement("div");
    div.className =
      "p-4 border-b hover:bg-gray-100 cursor-pointer flex justify-between items-center";

    div.innerHTML = `
      <div>
        <div class="font-bold">Anonymous</div>
        <div class="text-sm text-gray-500">${preview}</div>
      </div>
      <div class="text-xs text-gray-400">
        ${new Date(chat.created_at).toLocaleDateString()}
      </div>
    `;

    div.onclick = () => {
      window.location.href = `message.html?user=${otherUserId}`;
    };

    list.appendChild(div);
  });
}
</script>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto bg-white h-screen overflow-y-auto">
  <div class="p-4 font-bold text-xl border-b">
    Chats
  </div>

  <div id="chatList"></div>
</div>

</body>
</html>
