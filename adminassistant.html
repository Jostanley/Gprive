<!DOCTYPE html>
<html>
<head>
  <title>Admin Support Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex">

  <!-- USERS -->
  <div class="w-1/3 bg-white border-r overflow-y-auto">

    <div class="p-4 font-bold border-b">
      Support Users
    </div>

    <div id="usersList"></div>

  </div>

  <!-- CHAT -->
  <div class="flex-1 flex flex-col">

    <div
      id="chatHeader"
      class="p-4 bg-white border-b font-bold">
      Select User
    </div>

    <div
      id="chatBox"
      class="flex-1 overflow-y-auto p-4">
    </div>

    <div class="bg-white border-t p-3 flex gap-2">

      <input
        id="replyMessage"
        placeholder="Type reply..."
        class="flex-1 border rounded p-2">

      <button
        onclick="sendReply()"
        class="bg-green-600 text-white px-4 py-2 rounded">
        Send
      </button>

    </div>

  </div>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
);

const usersList =
document.getElementById("usersList");

const chatBox =
document.getElementById("chatBox");

let selectedUser = null;
let admin = null;

// ====================
// LOAD USERS
// ====================

async function loadUsers() {

  const {
    data: { session }
  } = await supabase.auth.getSession();

  if (!session) {
    alert("Not logged in");
    window.location.href ="login.html"
    return;
  }

  admin = session.user.id;

  const { data, error } = await supabase
    .from("messages")
    .select("sender_id, receiver_id")
    .or(`sender_id.eq.${admin},receiver_id.eq.${admin}`)
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    alert(error.message);
    return;
  }

  usersList.innerHTML = "";

  if (!data || data.length === 0) {
    usersList.innerHTML =
      "<div class='p-4 text-gray-500'>No users found</div>";
    return;
  }

  const usersSet = new Set();

  data.forEach(msg => {
    if (msg.sender_id !== admin) {
      usersSet.add(msg.sender_id);
    }

    if (msg.receiver_id !== admin) {
      usersSet.add(msg.receiver_id);
    }
  });

  usersSet.forEach(userId => {

    const div = document.createElement("div");

    div.className =
      "p-3 border-b cursor-pointer hover:bg-gray-100";

    div.innerHTML = `
      <div class="font-semibold">
        ${userId}
      </div>
    `;

    div.onclick = () => {
      selectUser(userId);
    };

    usersList.appendChild(div);
  });

}
window.selectUser = async function(user) {

  selectedUser = user;

  // Clear old messages immediately
  chatBox.innerHTML = "";

  document.getElementById("chatHeader").innerText =
    "Chat with " + user;

  await loadChat();
};


// ====================
// LOAD CHAT
// ====================

async function loadChat() {

  if (!selectedUser) return;

  const currentUser = selectedUser;

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .or(
      `and(sender_id.eq.${currentUser},receiver_id.eq.${admin}),and(sender_id.eq.${admin},receiver_id.eq.${currentUser})`
    )
    .order("created_at", { ascending: true });

  // User changed while request was loading
  if (currentUser !== selectedUser) return;

  if (error) {
    console.log(error);
    alert(error.message);
    return;
  }

  chatBox.innerHTML = "";

  if (!data || data.length === 0) {
    chatBox.innerHTML =
      "<div class='text-gray-500'>No messages</div>";
    return;
  }

  data.forEach(msg => {

    const isAdmin = msg.sender_id === admin;

    const div = document.createElement("div");

    div.className = `
      mb-2
      p-3
      rounded
      max-w-[80%]
      ${isAdmin ? "bg-green-100 ml-auto" : "bg-white"}
    `;

    div.textContent = msg.message || "";

    chatBox.appendChild(div);

  });

  chatBox.scrollTop = chatBox.scrollHeight;
}


// ====================
// SEND REPLY
// ====================

window.sendReply = async function(){

  if (!selectedUser) {
    alert("Select a user");
    return;
  }

  const input =
    document.getElementById(
      "replyMessage"
    );

  const text =
    input.value.trim();

  if (!text) return;

  const { error } = await supabase
  .from("messages")
  .insert([{
    sender_id: admin,
    receiver_id: selectedUser,
    message: text,
    is_admin: true
  }]);

if (error) {
  console.log(error);
  alert(error.message);
  input.value = "";
  return;
}

  input.value = "";

};

// ====================
// REALTIME
// ====================

supabase
.channel("admin-chat")
.on(
  "postgres_changes",
  {
    event: "*",
    schema: "public",
    table: "messages"
  },
  () => {

    loadUsers();

    if (selectedUser)
      loadChat();

  }
)
.subscribe();

loadUsers();



</script>

</body>
</html>
