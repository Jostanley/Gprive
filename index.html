<script>

);

const API = "https://gpriv.onrender.com";

let posts = [];
let expandedPosts = {};

// ======================
// AUTH CHECK
// ======================


let token = null;
let currentUser = null;
const postsDiv = document.getElementById("posts");

window.onload = async () => {
  postsDiv.innerHTML = "Loading...";

}

// ======================
// LOAD POSTS
// ======================

async function loadPosts() {
   posts = await (await fetch(`${API}/posts`)).json();
  const comments = await (await fetch(`${API}/comments`)).json();
  const replies = await (await fetch(`${API}/replies`)).json();
  const postslikes = await (await fetch(`${API}/postsLikes`)).json();
  const replyLikes = await (await fetch(`${API}/replylikes`)).json();
  const replyDislikes = await (await fetch(`${API}/replydislikes`)).json();

  // 🔥 1. Group comments by post
  const commentMap = {};
  comments.forEach(c => {
    (commentMap[c.post_id] ||= []).push(c);
  });

  // 🔥 2. Group replies by comment
  const replyMap = {};
  replies.forEach(r => {
    (replyMap[r.comment_id] ||= []).push(r);
  });

  // 🔥 3. Count post likes
  const postLikeMap = {};
  postslikes.forEach(l => {
    postLikeMap[l.post_id] = (postLikeMap[l.post_id] || 0) + 1;
  });

  // 🔥 4. Count reply likes
  const replyLikeMap = {};
  replyLikes.forEach(l => {
    replyLikeMap[l.comment_id] = (replyLikeMap[l.comment_id] || 0) + 1;
  });

  // 🔥 5. Count reply dislikes
  const replyDislikeMap = {};
  replyDislikes.forEach(d => {
    replyDislikeMap[d.comment_id] = (replyDislikeMap[d.comment_id] || 0) + 1;
  });

  // ✅ 6. Attach likes/dislikes to REPLIES
  comments.forEach(comment => {
    comment.liked = replyLikeMap[comment.id] || 0;
    comment.disliked = replyDislikeMap[comment.id] || 0;
  });

  // ✅ 7. Attach replies + aggregate likes to COMMENTS
  comments.forEach(comment => {
    const commentReplies = replyMap[comment.id] || [];

    comment.replies = commentReplies;

    // 🔥 total likes of all replies under this comment
    comment.replyLikes = commentReplies.reduce(
      (sum, r) => sum + (r.likes || 0),
      0
    );

    // 🔥 total dislikes
    comment.replyDislikes = commentReplies.reduce(
      (sum, r) => sum + (r.dislikes || 0),
      0
    );
  });

  // ✅ 8. Attach comments to POSTS
  posts.forEach(post => {
    post.comments = commentMap[post.id] || [];
    post.likes = postLikeMap[post.id] || 0;
  });

  // ✅ 9. Render everything
  render(posts);
}



// ======================
// RENDER POSTS
// ======================
function render(data) {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  data.forEach(post => {
    const comments = post.comments || []; 
    

    const isVideo = post.file &&
      (post.file.includes(".mp4") || post.file.includes(".webm"));

    postsDiv.innerHTML += `
      <div class="bg-white p-4 rounded shadow ">
    <div class="flex w-full justify-between">
         <div>
        <h1 class="text-blue-600 font-bold">${post.username}</h1>
        <small>${timeAgo(post.created_at)}</small>
        </div>
        <h1 id="postoption" class="font-bold">...</h1>
</div>
        <h2 class="font-semibold">${post.title}</h2>

        <p>
          ${expandedPosts[post.id]
            ? post.content
            : post.content.slice(0, 100) + "..."}
        </p>

        <button onclick="togglePost('${post.id}')" class="text-blue-500 text-sm">
          ${expandedPosts[post.id] ? "View less" : "View more"}
        </button>

        ${post.file ? (
          isVideo
            ? `<video src="${post.file}" controls class="w-full mt-2 rounded"></video>`
            : `<img src="${post.file}" class="w-full mt-2 rounded"/>`
        ) : ""}

        <!-- ACTIONS -->
        <div class="flex gap-3 mt-2">
          <button onclick="upvote('${post.id}')">
             ${post.likes || 0} Likes 
          </button>
 <button onclick="goToMessage('${post.user_id}')">message
          <button onclick="toggleComments('${post.id}')">
            ${comments.length} Comments
          </button>
        </div>

        <!-- COMMENT BOX -->
        <div class="mt-2 flex gap-2 ">
          <input id="comment-${post.id}" class="border p-1 w-full" placeholder="Comment..." />
          <button onclick="addComment('${post.id}')" class="bg-blue-500 text-white px-2">
            Send
          </button>
        </div>

        <!-- COMMENTS -->
        <div id="comments-${post.id}" class="hidden mt-3 space-y-2">

          ${comments.map(c => `
            <div class="bg-gray-100 p-2 rounded">

              <p>${c.text}</p>

              <div class="flex gap-3 text-sm">
                <button onclick="likeComment('${c.id}')">${c.liked || 0} Likes</button>
                <button onclick="dislikeComment('${c.id}')">DisLikes ${c.disliked || 0}</button>
                <button onclick="toggleReply('${c.id}')">Reply</button>
              </div>

              <div id="reply-${c.id}" class="hidden gap-2 mt-2">
                <input id="replyInput-${c.id}" class="border p-1 w-full"/>
                <button onclick="sendReply('${c.id}')" class="bg-green-500 text-white px-2">
                  Send
                </button>
              </div>

              ${(c.replies || []).map(r => `
                <p class="ml-4 text-sm">↳ ${r.text}</p>
              `).join("")}

            </div>
          `).join("")}

        </div>

      </div>
    `;
  });
}

// ======================
// ACTIONS
// ======================
function togglePost(id) {
  expandedPosts[id] = !expandedPosts[id];
  render(posts);
}

function toggleComments(id) {
  document.getElementById(`comments-${id}`).classList.toggle("hidden");
}

function toggleReply(id) {
  document.getElementById(`reply-${id}`).classList.toggle("hidden");
}

// ======================
// API ACTIONS
// ======================
async function addComment(postId) {
  const input = document.getElementById(`comment-${postId}`);
  const text = input.value;

  if (!text) return;

  await fetch(`${API}/posts/${postId}/comments`, {
    method: "POST",
    headers: {"Content-Type": "application/json",
    "Authorization": `Bearer ${token}`},
    body: JSON.stringify({
      text
    })
  });

  input.value = "";
  loadPosts();
}

async function sendReply(commentId) {
  const input = document.getElementById(`replyInput-${commentId}`);
  const text = input.value;

  if (!text) return;

  await fetch(`${API}/comments/${commentId}/reply`, {
    method: "POST",
    headers: {"Content-Type": "application/json",
      "Authorization": `Bearer ${token}`},
    body: JSON.stringify({
      text
      
    })
  });

  input.value = "";
  loadPosts();
}

async function upvote(id) {
  await fetch(`${API}/posts/${id}/upvote`, {
    method: "POST",
    headers: {"Content-Type": "application/json",

  loadPosts();
}

// ======================
// SEARCH
// ======================
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = posts.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.content.toLowerCase().includes(q)
  );

  render(filtered);
});

// ======================
// TIME AGO
// ======================
function timeAgo(date) {
  const seconds = Math.floor((new Date() - new Date(date)) / 1000);
  const units = [
    ["year", 31536000],
    ["month", 2592000],
    ["day", 86400],
    ["hour", 3600],
    ["minute", 60]
  ];

  for (let [label, sec] of units) {
    const count = Math.floor(seconds / sec);
    if (count > 0) return count + " " + label + " ago";
  }

  return "Just now";
}

//messaging page
function goToMessage(userId, postId) {
  window.location.href = `message.html?userId=${userId}&postId=${postId}`;
}
