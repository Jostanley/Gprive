<!-- POSTS -->
<div id="posts" class="p-4 space-y-3"></div>

<script>
const API = "https://gpriv.onrender.com";

const postsDiv = document.getElementById("posts");
const search = document.getElementById("search");

let posts = [];

let expandedPosts = {};
function togglePost(id) {
  expandedPosts[id] = !expandedPosts[id];
  loadPosts(); // re-render UI
}
/* =====================
   LOAD POSTS
===================== */
async function loadPosts() {
  postsDiv.innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/posts`);
    posts = await res.json();
    
    

    render(posts);

  } catch (err) {
    console.log(err);
    postsDiv.innerHTML = "Failed to load posts";
  }
}

/* =====================
   RENDER POSTS
===================== */
function render(data) {
  postsDiv.innerHTML = "";

  data.forEach(post => {

    const comments = post.comments || [];
    const commentCount = comments.length;

const isVideo = post.file && (
      post.file.includes(".mp4") ||
      post.file.includes(".webm")
    );
    postsDiv.innerHTML += `
      <div class="bg-white p-4 shadow rounded">

        <!-- POST INFO -->
        <div>
          <h1 class="font-bold text-blue-700">${post.username}</h1>
          <small>${timeAgo(post.created_at)}</small>
        </div>

        <h2 class="font-semibold mt-1">${post.title}</h2>
        
        <!-- new slice -->
       
      <p>
  ${expandedPosts[post.id] 
    ? post.content 
    : post.content.slice(0, 100) + (post.content.length > 100 ? "..." : "")
  }
</p>

${post.content.length > 10 ? `
  <button class="text-blue-500 text-sm" onclick="togglePost('${post.id}')">
    ${expandedPosts[post.id] ? "View less" : "View more"}
  </button>
` : ""}

   ${post.file ? (
        isVideo
          ? `<video src="${post.file}" controls class="w-full rounded-xl"></video>`
          : `<img src="${post.file}" class="w-full rounded-xl" />`
      ) : ""}
        <!-- ACTIONS -->
        <div class="flex gap-3 mt-2">
          <button onclick="upvote('${post.id}')">
            ${post.upvotes || 0} Like
          </button>

          <button onclick="toggleComments('${post.id}')">
            ${commentCount} Comments
          </button>
        </div>

        <!-- COMMENT INPUT -->
        <div class="mt-2 flex gap-2">
          <input id="comment-${post.id}" class="border p-1 w-full" placeholder="Write comment..." />
          <button onclick="addComment('${post.id}')" class="bg-blue-500 text-white px-2">
            Send
          </button>
        </div>

        <!-- COMMENTS -->
        <div id="comments-${post.id}" class="hidden mt-3 border-t pt-2 space-y-2">

          ${comments.map(c => `
            <div class="bg-gray-100 p-2 rounded">

              <p>${c.text}</p>

              <!-- COMMENT ACTIONS -->
              <div class="flex gap-3 text-sm mt-1">

                <button onclick="likeComment('${c.id}', '${post.id}')">
                   ${c.likes || 0} like
                </button>

                <button onclick="dislikeComment('${c.id}', '${post.id}')">
                   ${c.dislikes || 0} dislike
                </button>

                <button onclick="showReply('${c.id, event}')">
                  ↩ Reply
                </button>

              </div>

              <!-- REPLY INPUT -->
              <div id="reply-box-${c.id}" class="hidden mt-2 flex gap-2">
                <input id="reply-input-${c.id}" class="border p-1 w-full" placeholder="Reply..." />
                <button onclick="sendReply('${c.id}', '${post.id}')" class="bg-green-500 text-white px-2">
                  Send
                </button>
              </div>

              <!-- REPLIES -->
              <div class=" mt-2  space-y-1 bg-white p-1 ml-4 text-sm border-l">
                ${(c.replies || []).map(r => `
                  <p class="bg-white p-1 rounded">↳ ${r.text}</p>
                `).join("")}
              </div>

            </div>
          `).join("")}

        </div>

      </div>
    `;
  });
}

/* =====================
   TOGGLE COMMENTS
===================== */
function toggleComments(postId) {
  const box = document.getElementById(`comments-${post.id}`);
  if (!box) return;
  box.classList.toggle("hidden");

}

//Toggle Replies

function toggleReplies(commentId, e) {
 
 if (e) e.stopPropagation(); // s
  const box = document.getElementById(`replies-${commentId}`);
  if (!box) return;

  box.classList.toggle("hidden");
}
/* =====================
   ADD COMMENT
===================== */
async function addComment(postId) {
  const input = document.getElementById(`comment-${postId}`);
  const text = input.value;

  if (!text) return;

  await fetch(`${API}/posts/${postId}/comments`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  input.value = "";
  loadPosts();
}

/* =====================
   UPVOTE
===================== */
async function upvote(id) {
  await fetch(`${API}/posts/${id}/upvote`, {
    method: "POST"
  });

  loadPosts();
}

/* =====================
   COMMENT LIKE
===================== */
async function likeComment(commentId) {
  await fetch(`${API}/comments/${commentId}/like`, {
    method: "POST"
  });

  loadPosts();
}

/* =====================
   COMMENT DISLIKE
===================== */
async function dislikeComment(commentId) {
  await fetch(`${API}/comments/${commentId}/dislike`, {
    method: "POST"
  });

  loadPosts();
}

/* =====================
   REPLY BOX TOGGLE
===================== */
function showReply(commentId,e) {
if (e) e.stopPropagation(); // prevent parent click
  const box = document.getElementById(`reply-box-${commentId}`);
  box.classList.toggle("hidden");
}

/* =====================
   SEND REPLY
===================== */
async function sendReply(commentId, postId) {
  const input = document.getElementById(`reply-input-${commentId}`);
  const text = input.value;

  if (!text) return;

  await fetch(`${API}/comments/${commentId}/reply`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  input.value = "";
  loadPosts();
}

/* =====================
   SEARCH
===================== */
search.addEventListener("input", () => {
  const q = search.value.toLowerCase();

  const filtered = posts.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.content.toLowerCase().includes(q)
  );

  render(filtered);
});

/* =====================
   TIME AGO
===================== */
function timeAgo(date) {
  const seconds = Math.floor((new Date() - new Date(date)) / 1000);

  const intervals = [
    { label: "year", seconds: 31536000 },
    { label: "month", seconds: 2592000 },
    { label: "day", seconds: 86400 },
    { label: "hour", seconds: 3600 },
    { label: "minute", seconds: 60 }
  ];

  for (let i of intervals) {
    const count = Math.floor(seconds / i.seconds);
    if (count > 0) {
      return count + " " + i.label + (count > 1 ? "s" : "") + " ago";
    }
  }

  return "Just now";
}

/* =====================
   START APP
===================== */
loadPosts();

</script>
