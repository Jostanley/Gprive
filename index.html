<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', () => {
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    if (choice.outcome === 'accepted') {
      console.log('App installed');
    }
  });
});
</script>

<!-- POSTS -->
<div id="posts" class="p-4 space-y-3"></div>

<script>
const API = "https://gpriv.onrender.com";

const postsDiv = document.getElementById("posts");
const search = document.getElementById("search");

let posts = [];
let replies = [];
let expandedPosts = {};
    
function togglePost(id) {
  expandedPosts[id] = !expandedPosts[id];
  loadPosts(); // re-render UI
}

/* =====================
   LOAD POSTS
===================== */
async function loadPosts() {
  postsDiv.innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/posts`);
    posts = await res.json();

    const r = await fetch(`${API}/replies`);
    replies = await r.json();

    render(posts);

  } catch (err) {
    console.log(err);
    postsDiv.innerHTML = "Failed to load posts";
  }
}

/* =====================
   RENDER POSTS
===================== */
function render(data) {
  postsDiv.innerHTML = "";

  data.forEach(post => {

    const comments = post.comments || [];

    postsDiv.innerHTML += `
      <div class="bg-white p-4 shadow rounded">

        <!-- POST -->
        <h1 class="font-bold text-blue-700">${post.username}</h1>
        <h2 class="font-semibold">${post.title}</h2>
        <p>
  ${expandedPosts[post.id] 
    ? post.content 
    : post.content.slice(0, 100) + (post.content.length > 100 ? "..." : "")
  }
</p>

${post.content.length > 20 ? `
  <button class="text-blue-500 text-sm" onclick="togglePost('${post.id}')">
    ${expandedPosts[post.id] ? "View less" : "View more"}
  </button>
` : ""}

        <!-- ACTIONS -->
        <div class="flex gap-3 mt-2 text-sm">
          <button onclick="upvote('${post.id}')" class= "font-semibold">
            Like ${post.upvotes || 0}
          </button>

        <button class = "font-semibold" onclick="toggleComments('${post.id}')">
            comments ${comments.length}
          </button>
        </div>

        <!-- COMMENT INPUT -->
        <div class="mt-2 flex gap-2">
          <input id="comment-${post.id}" class="border p-1 w-full" placeholder="Write comment..." />
          <button onclick="addComment('${post.id}')" class="bg-blue-500 text-white px-2">
            Send
          </button>
        </div>

        <!-- COMMENTS -->
        <div id="comments-${post.id}" class="hidden mt-3 space-y-2 border-t pt-2">

          ${comments.map(c => {

            const commentReplies = replies.filter(r => r.comment_id === c.id);

            return `
              <div onclick="toggleReplies('${c.id}')" class="bg-gray-100 p-2 rounded">

                <p>${c.text}</p>

                <!-- COMMENT ACTIONS -->
                <div class="flex gap-3 text-xs mt-1">

                  <button class ="font-semibold" onclick="likeComment('${c.id}')">
                    Like ${c.likes || 0}
                  </button>

                  <button class = "font-semibold" onclick="dislikeComment('${c.id}')">
                    Dislike ${c.dislikes || 0}
                  </button>

                  <button class = "font-semibold" onclick="toggleReplyBox('${c.id}')">
                    ↩ Reply (${commentReplies.length})
                  </button>

                  <button onclick="toggleReplies('${c.id}')">
                    Show Replies
                  </button>

                </div>

                <!-- REPLY INPUT -->
                <div id="reply-box-${c.id}" class="hidden mt-2 flex gap-2">
                  <input id="reply-input-${c.id}" class="border p-1 w-full" placeholder="Reply..." />
                  <button onclick="sendReply('${c.id}')" class="bg-green-500 text-white px-2">
                    Send
                  </button>
                </div>

                <!-- REPLIES LIST -->
                <div id="replies-${c.id}" class="hidden mt-2 ml-4 space-y-1">

                  ${commentReplies.map(r => `
                    <p class="text-sm bg-white p-1 rounded">↳ ${r.text}</p>
                  `).join("")}

                </div>

              </div>
            `;
          }).join("")}

        </div>

      </div>
    `;
  });
}

/* =====================
   TOGGLE COMMENTS
===================== */
function toggleComments(postId) {
  const box = document.getElementById(`comments-${postId}`);
  box.classList.toggle("hidden");
}

/* =====================
   ADD COMMENT
===================== */
async function addComment(postId) {
  const input = document.getElementById(`comment-${postId}`);
  const text = input.value;

  if (!text) return;

  await fetch(`${API}/posts/${postId}/comments`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  input.value = "";
  loadPosts();
}

/* =====================
   UPVOTE POST
===================== */
async function upvote(id) {
  await fetch(`${API}/posts/${id}/upvote`, { method: "POST" });
  loadPosts();
}

/* =====================
   COMMENT LIKE
===================== */
async function likeComment(id) {
  await fetch(`${API}/comments/${id}/like`, { method: "POST" });
  loadPosts();
}

/* =====================
   COMMENT DISLIKE
===================== */
async function dislikeComment(id) {
  await fetch(`${API}/comments/${id}/dislike`, { method: "POST" });
  loadPosts();
}

/* =====================
   REPLY BOX
===================== */
function toggleReplyBox(id) {
  const box = document.getElementById(`reply-box-${id}`);
  box.classList.toggle("hidden");
}

/* =====================
   SEND REPLY
===================== */
async function sendReply(commentId) {
  const input = document.getElementById(`reply-input-${commentId}`);
  const text = input.value;

  if (!text) return;

  await fetch(`${API}/comments/${commentId}/reply`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  input.value = "";
  loadPosts();
}

/* =====================
   TOGGLE REPLIES
===================== */
function toggleReplies(commentId) {
  const box = document.getElementById(`replies-${commentId}`);
  box.classList.toggle("hidden");
}

/* =====================
   SEARCH
===================== */
search.addEventListener("input", () => {
  const q = search.value.toLowerCase();

  const filtered = posts.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.content.toLowerCase().includes(q)
  );

  render(filtered);
});

/* =====================
   START
===================== */
loadPosts();

</script>
