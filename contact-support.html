<!DOCTYPE html>
<html>
<head>
  <title>Contact Support - Gprive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

  <!-- Header -->
  <div class="bg-white p-4 shadow flex items-center rounded-xl max-w-xl mx-auto">
    <button onclick="history.back()" class="mr-3 text-xl bold">←</button>
    <h1 class="font-bold text-lg">Contact Support</h1>
  </div>

  <!-- Form -->
  <div class="max-w-xl mx-auto mt-4 bg-white p-5 rounded-xl shadow space-y-4">

    <p class="text-gray-600 text-sm">
      Need help? Send us a message and our support team will respond as soon as possible.
    </p>

    <!-- Email -->
    <input 
      type="email"
      class="w-full p-3 border rounded"
      placeholder="Your email address"
    />

    <!-- Subject -->
    <input 
      class="w-full p-3 border rounded"
      placeholder="Subject (e.g. Login issue)"
    />

    <!-- Message -->
    <textarea 
      class="w-full p-3 border rounded h-40"
      placeholder="Describe your issue in detail..."
    ></textarea>

    <!-- Priority -->
    <select class="w-full p-3 border rounded">
      <option>Select priority</option>
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
      <option>Urgent</option>
    </select>

    <!-- Submit -->
    <button 
      onclick="sendMessage()"
      class="w-full bg-green-600 text-white p-3 rounded">
      Send Message
    </button>

    <p class="text-xs text-gray-500 text-center">
      Typical response time: 24–48 hours
    </p>

  </div>

  <script>
    function sendMessage() {
      alert("Message sent successfully (UI only). Connect backend later.");
      history.back();
    }
  </script>

</body>
</html>
