<!DOCTYPE html>
<html>
<head>
  <title>Support Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex flex-col h-screen">

  <!-- HEADER -->
  <div class="bg-green-600 text-white p-4 text-center font-bold shadow">
    Customer Support
  </div>

  <!-- CHAT AREA -->
  <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

  <!-- INPUT AREA -->
  <div class="bg-white border-t p-3 flex gap-2">

    <input type="file" id="fileInput" class="hidden">

    <button onclick="document.getElementById('fileInput').click()"
      class="px-3 py-2 bg-gray-200 rounded">
      📎
    </button>

    <input id="message"
      placeholder="Type a message..."
      class="flex-1 border rounded p-2 outline-none">

    <button onclick="sendMessage()"
      class="bg-green-600 text-white px-4 py-2 rounded">
      Send
    </button>

  </div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
 "https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
);

const chatBox = document.getElementById("chatBox");

let currentUser = null;
let adminId = null;

// ======================
// INIT
// ======================
async function init() {
  

  const { data, error } = await supabase.auth.getSession();

  console.log("🔐 Session response:", data, error);

  if (data?.session?.user) {
    currentUser = data.session.user.id;
    console.log("👤 Logged user:", currentUser);
  } else{
      window.location.href ="login.html"
  
  }

  // GET ADMIN
  const adminRes = await supabase
    .from("users")
    .select("id,is_admin");

  console.log("🛠 Admin query response:", adminRes);

  if (adminRes.error) {
    console.log("❌ Admin error:", adminRes.error);
  }

  adminId = adminRes.data?.[0]?.id;

  console.log("👑 Admin ID:", adminId);

  loadMessages();
}

init();

// ======================
// SEND MESSAGE
// ======================
window.sendMessage = async () => {
  

  const input = document.getElementById("message");
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];

  const text = input.value.trim();
  
  console.log("📎 File:", file);

  let fileUrl = null;

  // Upload file
  if (file) {
    const fileName = Date.now() + "-" + file.name;

  

    const upload = await supabase.storage
      .from("chat-files")
      .upload(fileName, file);

   

    if (!upload.error) {
      const publicUrl = supabase.storage
        .from("chat-files")
        .getPublicUrl(fileName);

     

      fileUrl = publicUrl.data.publicUrl;
    }
  }

  if (!text && !fileUrl) {
    console.log("⚠️ Nothing to send");
    return;
  }

  const insertRes = await supabase.from("messages").insert([
    {
      sender_id: currentUser,
      receiver_id: adminId,
      message: text,
      file_url: fileUrl,
      is_admin: false
    }
  ]);

  console.log("📨 Insert response:", insertRes);

  input.value = "";
  fileInput.value = "";
};

// ======================
// LOAD MESSAGES
// ======================
async function loadMessages() {
 

  if (!currentUser || !adminId) {
    console.log("⚠️ Missing user or admin:")
    return;
  }

  const res = await supabase
    .from("messages")
    .select("*")
    .or(
      `and(sender_id.eq.${currentUser},receiver_id.eq.${adminId}),and(sender_id.eq.${adminId},receiver_id.eq.${currentUser})`
    )
    .order("created_at", { ascending: true });

  console.log("📥 Messages response:", res);

  if (res.error) {
    console.log("❌ Load error:", JSON.stringify(res.error, null, 2));
    return;
  }

  chatBox.innerHTML = "";

  res.data.forEach(msg => {
    console.log("💬 Message:", msg);

    const mine = msg.sender_id === currentUser;

    const div = document.createElement("div");

    div.className =
      `max-w-[80%] p-3 rounded shadow ${
        mine ? "bg-green-100 ml-auto" : "bg-white"
      }`;

    let html = "";

    if (msg.message) html += `<p>${msg.message}</p>`;

    if (msg.file_url) {
      html += `
        <a href="${msg.file_url}" target="_blank"
          class="text-blue-600 underline block mt-1">
          📎 View Attachment
        </a>
      `;
    }

    html += `
      <div class="text-xs text-gray-500 mt-1">
        ${new Date(msg.created_at).toLocaleString()}
      </div>
    `;

    div.innerHTML = html;
    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

// ======================
// ENTER KEY
// ======================
document.getElementById("message").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    console.log("⌨️ Enter pressed");
    sendMessage();
  }
});

// ======================
// REALTIME
// ======================
supabase
  .channel("support-room")
  .on("postgres_changes", {
    event: "*",
    schema: "public",
    table: "messages"
  }, (payload) => {
    console.log("⚡ Realtime update:", payload);
    loadMessages();
  })
  .subscribe();

// AUTO REFRESH
setInterval(() => {
  console.log("🔁 Auto refresh messages");
  loadMessages();
}, 3000);
</script>

</body>
</html>
