<!DOCTYPE html>
<html>
<head>
  <title>Users Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold mb-5">Users</h1>

<input
  id="search"
  placeholder="Search users..."
  class="border p-2 rounded w-full mb-4"
/>

<div class="bg-white rounded shadow overflow-auto">

  <table class="w-full">

    <thead class="bg-gray-200">
      <tr>
        <th class="p-3 text-left">Username</th>
        <th class="p-3 text-left">Email</th>
        <th class="p-3 text-left">Status</th>
        <th class="p-3 text-left">Actions</th>
      </tr>
    </thead>

    <tbody id="usersTable"></tbody>

  </table>

</div>

<script type="module">
import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
        "https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
);

let users = [];

// =====================
// CHECK ADMIN ACCESS
// =====================
window.onload = async function() {

  const {
    data: { session }
  } = await supabase.auth.getSession();

  // Not logged in
  if (!session) {
    alert("Login required");
    window.location.href = "../Login.html";
    return false;
  }

  // Get user record
  const { data: user, error } = await supabase
    .from("users")
    .select("is_admin")
    .eq("id", session.user.id)
    .single();

  if (error || !user) {
    alert("User not found");
    window.location.href = "../login.html";
    return false;
  }

  // Not admin
  if (!user.is_admin) {
    alert("Access denied");
    window.location.href = "../index.html";
    return false;
  }
 
}
// Load users
async function loadUsers() {

  const { data, error } = await supabase
    .from("users")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  users = data || [];

  renderUsers(users);
}

// Render table
function renderUsers(data) {

  const tbody = document.getElementById("usersTable");

  tbody.innerHTML = data.map(user => `
    <tr class="border-b">

      <td class="p-3">
        ${user.username || "No username"}
      </td>

      <td class="p-3">
        ${user.email || "-"}
      </td>

      <td class="p-3">
        <span class="
          px-2 py-1 rounded text-sm
          ${
            user.status === "active"
            ? "bg-green-100 text-green-700"
            : ""
          }
          ${
            user.status === "warned"
            ? "bg-yellow-100 text-yellow-700"
            : ""
          }
          ${
            user.status === "suspended"
            ? "bg-orange-100 text-orange-700"
            : ""
          }
          ${
            user.status === "banned"
            ? "bg-red-100 text-red-700"
            : ""
          }
        ">
          ${user.status || "active"}
        </span>
      </td>

      <td class="p-3">

        <select
          onchange="changeStatus('${user.id}', this.value)"
          class="border rounded p-1">

          <option value="active"
            ${user.status === "active" ? "selected" : ""}>
            Active
          </option>

          <option value="warned"
            ${user.status === "warned" ? "selected" : ""}>
            Warned
          </option>

          <option value="suspended"
            ${user.status === "suspended" ? "selected" : ""}>
            Suspended
          </option>

          <option value="banned"
            ${user.status === "banned" ? "selected" : ""}>
            Banned
          </option>

        </select>

      </td>

    </tr>
  `).join("");
}

// Update user status
window.changeStatus = async (userId, status) => {

  const confirmed = confirm(
    `Change user status to "${status}"?`
  );

  if (!confirmed) {
    loadUsers();
    return;
  }

  const { error } = await supabase
    .from("users")
    .update({ status })
    .eq("id", userId);

  if (error) {
    alert(error.message);
    return;
  }

  alert("Status updated");

  loadUsers();
};

// Search
document
.getElementById("search")
.addEventListener("input", e => {

  const value = e.target.value.toLowerCase();

  const filtered = users.filter(user =>
    (user.username || "")
      .toLowerCase()
      .includes(value)
  );

  renderUsers(filtered);
});

loadUsers();

</script>

</body>
</html>
