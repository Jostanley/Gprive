<!DOCTYPE html>
<html>
<head>
  <title>Profile - Gprive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 pb-20">

<!-- HEADER -->
<div class="bg-white p-4 text-center shadow">
  <h1 class="text-xl font-bold">👤 Profile</h1>
</div>

<div class="bg-white p-4 text-center shadow">
  <button onclick="logout()"
    class="bg-red-500 text-white px-4 py-2 rounded">
    Logout
  </button>
</div>

<!-- PROFILE -->
<div class="bg-white m-3 p-4 text-center rounded-xl shadow">
  <h2 id="username" class="font-bold text-lg">
    Loading...
  </h2>

  <p id="postCount"
    class="text-gray-500 text-sm">
    0 posts
  </p>
</div>

<!-- POSTS -->
<div class="p-3">
  <h2 class="font-bold mb-2">Your Posts</h2>

  <div id="userPosts" class="space-y-3">
    Loading posts...
  </div>
</div>

<script>

// =====================
// SUPABASE
// =====================
const supabasejs = window.supabase.createClient(
  "https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
);

const API = "https://gpriv.onrender.com";

let currentUser = null;
let presenceInterval = null;


// =====================
// INIT
// =====================
async function initUser() {

  try {

    const { data, error } =
      await supabasejs.auth.getUser();

    console.log(data, error);

    if (error || !data.user) {

      alert("Not logged in");

      window.location.href = "Login.html";

      return;
    }

    currentUser = data.user;

    console.log("USER:", currentUser);

    // SHOW USERNAME
    document.getElementById("username").textContent =
      currentUser.user_metadata?.username ||
      currentUser.email;

    // UPDATE ONLINE STATUS
    const { error: onlineError } =
      await supabasejs
        .from("users")
        .upsert({
          id: currentUser.id,
          is_online: true,
          last_seen: new Date().toISOString()
        });

    if (onlineError) {
      console.log("ONLINE ERROR:", onlineError);
    }

    // START PRESENCE
    if (!presenceInterval) {

      presenceInterval = setInterval(async () => {

        if (!currentUser) return;

        await supabasejs
          .from("users")
          .update({
            is_online: true,
            last_seen: new Date().toISOString()
          })
          .eq("id", currentUser.id);

      }, 30000);
    }

    loadProfile();

  } catch (err) {

    console.log(err);

    alert("Something failed");

  }
}


// =====================
// LOAD POSTS
// =====================
async function loadProfile() {

  try {

    const container =
      document.getElementById("userPosts");

    container.innerHTML = "Loading posts...";

    const res = await fetch(`${API}/posts`);

    console.log("FETCH STATUS:", res.status);

    if (!res.ok) {

      container.innerHTML =
        "<p class='text-red-500'>Failed to load posts</p>";

      return;
    }

    const posts = await res.json();

    console.log(posts);

    const userPosts = posts.filter(
      post => post.user_id === currentUser.id
    );

    document.getElementById("postCount").textContent =
      `${userPosts.length} posts`;

    container.innerHTML = "";

    if (userPosts.length === 0) {

      container.innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow text-center text-gray-500">
          No posts yet
        </div>
      `;

      return;
    }

    userPosts.forEach(post => {

      const div = document.createElement("div");

      div.className =
        "bg-white p-3 rounded-xl shadow";

      const isVideo =
        post.file &&
        (
          post.file.includes(".mp4") ||
          post.file.includes(".webm")
        );

      div.innerHTML = `

        <h3 class="font-bold mb-1">
          ${post.title || ""}
        </h3>

        <p class="text-gray-600 mb-2">
          ${post.content || ""}
        </p>

        ${post.file ? (

          isVideo

          ? `

          <video
            src="${post.file}"
            controls
            class="w-full rounded-xl">
          </video>

          `

          : `

          <img
            src="${post.file}"
            class="w-full rounded-xl"
          />

          `

        ) : ""}

        <button
          onclick="deletePost('${post.id}')"
          class="mt-3 bg-red-500 text-white px-3 py-1 rounded">

          Delete

        </button>
      `;

      container.appendChild(div);

    });

  } catch (err) {

    console.log(err);

    document.getElementById("userPosts").innerHTML =
      "<p class='text-red-500'>Error loading posts</p>";

  }
}


// =====================
// DELETE POST
// =====================
async function deletePost(id) {

  if (!confirm("Delete this post?")) return;

  try {

    const res = await fetch(
      `${API}/posts/${id}`,
      {
        method: "DELETE"
      }
    );

    console.log("DELETE:", res.status);

    if (!res.ok) {

      alert("Delete failed");

      return;
    }

    loadProfile();

  } catch (err) {

    console.log(err);

    alert("Delete error");

  }
}


// =====================
// LOGOUT
// =====================
async function logout() {

  try {

    if (currentUser) {

      await supabasejs
        .from("users")
        .update({
          is_online: false,
          last_seen: new Date().toISOString()
        })
        .eq("id", currentUser.id);
    }

    clearInterval(presenceInterval);

    await supabasejs.auth.signOut();

    localStorage.clear();

    window.location.href = "Login.html";

  } catch (err) {

    console.log(err);

    alert("Logout failed");

  }
}


// =====================
// GLOBAL
// =====================
window.logout = logout;
window.deletePost = deletePost;


// =====================
// START
// =====================
initUser();

</script>

</body>
</html>
