<!DOCTYPE html>
<html>
<head>
  <title>Profile - Gprive</title>

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
<script src="theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 pb-20">

<!-- HEADER -->

<div id="header" class="flex justify-between items-center bg-white w-full p-4">

  <!-- Profile -->
  <div class="flex items-center gap-2">

    <div class="text-3xl">👤</div>

    <div>
      <h1 class="font-bold">Profile</h1>
    </div>

  </div>

  <!-- Menu -->
  <div class="relative">

    <button
      onclick="toggleMenu()"
      class="text-2xl px-2">
      ☰
    </button>

    <div
      id="dropdownMenu"
      class="hidden absolute right-0 mt-2 w-40 bg-white border rounded-lg shadow-lg z-50">

      <button
        onclick="window.location.href='index.html'"
        class="block w-full text-left px-4 py-2 hover:bg-gray-100">
         Home
      </button>

      <button
        onclick="window.location.href='setting.html'"
        class="block w-full text-left px-4 py-2 hover:bg-gray-100">
        Settings
      </button>

      <button
        onclick="logout()"
        class="block w-full text-left px-4 py-2 text-red-500 hover:bg-gray-100">
         Logout
      </button>

    </div>

  </div>

</div>

<!-- PROFILE -->
<div class="bg-white m-3 p-4 text-center rounded-xl shadow">

  <h2
    id="username"
    class="font-bold text-lg">

    Loading...

  </h2>

  <p
    id="postCount"
    class="text-gray-500 text-sm">

    0 posts

  </p>

</div>

<!-- POSTS -->
<div class="p-3">

  <h2 class="font-bold mb-2">
    Your Posts
  </h2>

  <div
    id="userPosts"
    class="space-y-3">

    Loading posts...

  </div>

</div>

<script>

// =====================
// SUPABASE
// =====================
const supabasejs =
  window.supabase.createClient(
"https://edvwiqmydmxttviflouj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdndpcW15ZG14dHR2aWZsb3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTM0OTYsImV4cCI6MjA5MzM2OTQ5Nn0.qHTl9JCvqiP7wUgA9v839aRLQOgcIGpdZDY3z44O29c"
   

  );

const API =
  "https://gpriv.onrender.com";

let currentUser = null;

let presenceInterval = null;

let token = null;
// =====================
// UPDATE USER STATUS
// =====================
async function updateStatus(online = true) {

  if (!currentUser) return;

  try {

    await supabasejs
      .from("users")
      .upsert({
        id: currentUser.id,
        is_online: online,
        last_seen: new Date().toISOString()
      });

  } catch (err) {

    console.log(
      "STATUS ERROR:",
      err
    );

  }

}


// =====================
// INIT USER
// =====================

async function initUser() {
  try {
    const { data, error } = await supabasejs.auth.getSession();

    if (error || !data.session) {
      alert("Not logged in");
      window.location.href = "Login.html";
      return;
    }

    currentUser = data.session.user;
    token = data.session.access_token;

    // SHOW USERNAME
    document.getElementById("username").textContent =
      currentUser.user_metadata?.username ||
      currentUser.email;

    // SET ONLINE
    await updateStatus(true);

    // HEARTBEAT
    if (!presenceInterval) {
      presenceInterval = setInterval(async () => {
        await updateStatus(true);
      }, 30000);
    }

    loadProfile();

  } catch (err) {
    console.log(err);
    alert("Something failed");
  }
}
// =====================
// VISIBILITY CHANGE
// =====================
document.addEventListener(
  "visibilitychange",

  async () => {

    if (!currentUser) return;

    if (document.hidden) {

      await updateStatus(false);

    } else {

      await updateStatus(true);

    }

  }

);


// =====================
// INTERNET EVENTS
// =====================
window.addEventListener(
  "offline",

  async () => {

    await updateStatus(false);

  }

);

window.addEventListener(
  "online",

  async () => {

    await updateStatus(true);

  }

);


// =====================
// BEFORE UNLOAD
// =====================
window.addEventListener(
  "beforeunload",

  () => {

    if (!currentUser) return;

    supabasejs
      .from("users")
      .update({
        is_online: false,
        last_seen:
          new Date().toISOString()
      })
      .eq(
        "id",
        currentUser.id
      );

  }

);


// =====================
// LOAD POSTS
// =====================
async function loadProfile() {

  try {

    const container =
      document.getElementById(
        "userPosts"
      );

    container.innerHTML =
      "Loading posts...";

    const res =
      await fetch(
        `${API}/posts`
      );

    if (!res.ok) {

      container.innerHTML = `

        <p class="text-red-500">

          Failed to load posts

        </p>

      `;

      return;
    }

    const posts =
      await res.json();

    const userPosts =
      posts.filter(

        post =>

        post.user_id ===
        currentUser.id

      );

    document
      .getElementById(
        "postCount"
      )
      .textContent =

      `${userPosts.length} posts`;

    container.innerHTML = "";

    if (
      userPosts.length === 0
    ) {

      container.innerHTML = `

        <div class="bg-white p-4 rounded-xl shadow text-center text-gray-500">

          No posts yet

        </div>

      `;

      return;
    }

    userPosts.forEach(post => {

      const div =
        document.createElement(
          "div"
        );

      div.className =
        "bg-white p-3 rounded-xl shadow";

      const isVideo =

        post.file && (

          post.file.includes(".mp4") ||

          post.file.includes(".webm")

        );

      div.innerHTML = `

        <h3 class="font-bold mb-1">

          ${post.title || ""}

        </h3>

        <p class="text-gray-600 mb-2">

          ${post.content || ""}

        </p>

        ${post.file

          ? (

            isVideo

            ? `

            <video
              src="${post.file}"
              controls
              class="w-full rounded-xl">

            </video>

            `

            : `

            <img
              src="${post.file}"
              class="w-full rounded-xl"
            />

            `

          )

          : ""

        }
 <div class="flex align-center justify-between">
        <button
          onclick="deletePost('${post.id}')"

          class="mt-3 bg-red-500 text-white px-3 py-1 rounded">

          Delete

        </button>
        <button
          onclick="EditPost('${post.id}')"

          class="mt-3 bg-green-500 text-white px-3 py-1 rounded">

          Edit

        </button>
    
        </div>

      `;

      container.appendChild(div);

    });

  } catch (err) {

    console.log(err);

    document
      .getElementById(
        "userPosts"
      )
      .innerHTML = `

        <p class="text-red-500">

          Error loading posts

        </p>

      `;

  }

}


// =====================
// DELETE POST
// =====================
let isDeleting = false;

async function deletePost(postId) {
  if (isDeleting) return;

  const confirmDelete = confirm("Delete this post?");
  if (!confirmDelete) return;

  isDeleting = true;

  try {
    // optional: optimistic UI (remove instantly)
    document.getElementById(`post-${postId}`)?.remove();

    const res = await fetch(`${API}/posts/${postId}`, {
      method: "DELETE",
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Delete failed");

      // fallback: reload if UI already removed
      loadProfile(); 
      return;
    }

    // success
    console.log("Deleted:", data.message);
    document.getElementById(`post-${postId}`).remove()

  } catch (err) {
    console.log(err);
    alert("Network error");

    // restore UI if needed
    loadProfile();

  } finally {
    isDeleting = false;
  }
}

//========≠=======
//Edit post function
//==============
async function EditPost(id) {

  // save post id
  localStorage.setItem(
    "editingPostId",
    id
  );

  // go to create page
  window.location.href =
    "create.html";

}

//=========
//toggle header menu
//===≠=======

function toggleMenu() {
  document
    .getElementById("dropdownMenu")
    .classList.toggle("hidden");
}

// Close when clicking outside
document.addEventListener("click", (e) => {
  const menu = document.getElementById("dropdownMenu");

  if (
    !e.target.closest(".relative")
  ) {
    menu.classList.add("hidden");
  }
});
// =====================
// LOGOUT
// =====================
async function logout() {

  try {

    await updateStatus(false);

    clearInterval(
      presenceInterval
    );

    await supabasejs
      .auth
      .signOut();

    localStorage.clear();

    window.location.href =
      "Login.html";

  } catch (err) {

    console.log(err);

    alert(
      "Logout failed"
    );

  }

}


// =====================
// GLOBAL
// =====================
window.logout =
  logout;

window.deletePost =
  deletePost;


// =====================
// START
// =====================
initUser();

</script>

</body>
</html>
